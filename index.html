<script type="text/babel">
const { useState, useEffect } = React;

// ── Supabase ─────────────────────────────────────────────────
const SB_URL = "https://rntjainqdzgttikmuxmv.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJudGphaW5xZHpndHRpa211eG12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzk3OTAsImV4cCI6MjA5NTgxNTc5MH0.7mJoDfKUdRuBDYOgQFujLEW8HQ9Gd5VQNiiAyWKpM54";
const SB_H = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};
const dbGet = k=>fetch(`${SB_URL}/rest/v1/store?select=value&key=eq.${k}`,{headers:SB_H}).then(r=>r.json()).then(rows=>rows[0]?.value||null).catch(()=>null);
const dbSet = (k,v)=>fetch(`${SB_URL}/rest/v1/store`,{method:"POST",headers:{...SB_H,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({key:k,value:v})}).catch(()=>{});
const dbPing = ()=>fetch(`${SB_URL}/rest/v1/store?select=key&limit=1`,{headers:SB_H}).then(r=>r.ok).catch(()=>false);

// ── Constantes de negocio ─────────────────────────────────────
const PIN_CODE   = "2025";
const TEJAS_M2   = 42;       // tejas por m² — fijo
const M2_ROLLO   = 41.4;     // m² que cubre un rollo de malla

const DEF_CFG = {
  costoMaterial:    600,     // COP por teja
  costoTrabajador:  270,     // COP por teja
  costoArriendo:    70,      // COP por teja
  costoLuz:         133,     // COP por teja
  precioSoloTejaM2: 85000,   // precio al cliente — Solo Teja
  precioTodoCostoM2:106623,  // precio al cliente — Todo Costo
  precioMallaRollo: 262700,  // precio rollo malla al cliente
  pctInversion:     15,      // % de utilidad neta → Fondo Crecimiento
  pctComisionJG:    10,      // % sobre pago JG → comisión Kaston
  pctComisionHerm:  10,      // % sobre pago Hermilson → comisión Kaston
};

// ── Utils ─────────────────────────────────────────────────────
const uid  = ()=>Math.random().toString(36).slice(2,9);
const fmt  = n=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n||0);
const hoy  = ()=>new Date().toLocaleDateString("es-CO");
const n    = v=>parseFloat(v)||0;

function useStore(key,def=[]){
  const [data,setData]=useState(()=>{try{const c=localStorage.getItem(key);if(c)return JSON.parse(c);}catch{}return def;});
  const [ready,setReady]=useState(false);
  useEffect(()=>{(async()=>{try{const v=await dbGet(key);if(v){const p=JSON.parse(v);setData(p);localStorage.setItem(key,v);}}catch{}setReady(true);})();},[key]);
  const save=next=>{const d=typeof next==="function"?next(data):next;setData(d);const j=JSON.stringify(d);try{localStorage.setItem(key,j);}catch{}dbSet(key,j);};
  return [data,save,ready];
}

// ── Lógica financiera ─────────────────────────────────────────
// Rutas: A=Reemplazo cubierta, B=Solo suministro estructura, C=Adecuación desde cero
const RUTAS={
  A:{label:"Ruta A",desc:"Reemplazo de cubierta",sub:"Barro / Fibrocemento → KASTON",color:"bg-blue-700"},
  B:{label:"Ruta B",desc:"Solo suministro estructura",sub:"Base ya construida, sin contratistas externos",color:"bg-orange-600"},
  C:{label:"Ruta C",desc:"Adecuación estructural completa",sub:"Desde cero (ej: zinc). Activa JG + Hermilson",color:"bg-purple-600"},
};
const getRuta=o=>o.ruta||"A";

// Determina si se muestran tarjetas de contratistas
function mostrarContratistas(o){
  const r=getRuta(o);
  if(r==="C") return true;
  if(r==="A"&&o.requiereEstructural) return true;
  return false; // Ruta B nunca; Ruta A sin switch = nunca
}

// Tipo de contrato compatible con versiones anteriores
function getTipo(o){
  if(o.tipoContrato==="Todo Costo")           return "Todo Costo";
  if(o.tipoContrato==="Únicamente La Teja")   return "Únicamente La Teja";
  if(o.tipoContrato==="Solo Teja")            return "Únicamente La Teja"; // compat v1
  if(o.precio==="Todo costo")                 return "Todo Costo";
  return "Únicamente La Teja";
}

function getPrecioM2(o,cfg){
  return getTipo(o)==="Todo Costo"?(cfg.precioTodoCostoM2||106623):(cfg.precioSoloTejaM2||85000);
}

// Dispersión proporcional de un pago
function calcDisp(monto,m2,o,cfg){
  const total=(n(m2)*getPrecioM2(o,cfg));
  if(!total||!n(monto)) return null;
  const ratio=n(monto)/total;
  const tejas=ratio*n(m2)*TEJAS_M2;
  const matPrima    =tejas*(cfg.costoMaterial   ||600);
  const nomina      =tejas*(cfg.costoTrabajador  ||270);
  const costosFijos =tejas*((cfg.costoArriendo||70)+(cfg.costoLuz||133));
  const totalCostos =matPrima+nomina+costosFijos;
  const utilNeta    =n(monto)-totalCostos;
  const inversion   =Math.max(0,utilNeta)*(cfg.pctInversion||0)/100;
  return {tejas,matPrima,nomina,costosFijos,totalCostos,utilNeta,inversion,utilLibre:utilNeta-inversion};
}

// Calcular rollos de malla necesarios
function calcRollos(m2,cfg){
  const r=Math.ceil(n(m2)/M2_ROLLO);
  return {rollos:r,total:r*(cfg.precioMallaRollo||262700)};
}

// Calcular estado de bolsas desde caja
function calcBolsas(caja){
  const b={matPrima:0,nomina:0,costosFijos:0,inversion:0,disponible:0};
  for(const e of caja){
    const m=n(e.monto);
    if(e.tipo==="matPrima")    b.matPrima   +=m;
    if(e.tipo==="nomina")      b.nomina      +=m;
    if(e.tipo==="costosFijos") b.costosFijos +=m;
    if(e.tipo==="inversion")   b.inversion   +=m;
    if(e.tipo==="utilLibre")   b.disponible  +=m;
    if(e.tipo==="mallas")      b.disponible  +=m;
    if(e.tipo==="gastoManual"){
      if(e.deBolsa==="nomina")      b.nomina      -=m;
      if(e.deBolsa==="matPrima")    b.matPrima    -=m;
      if(e.deBolsa==="costosFijos") b.costosFijos -=m;
      if(e.deBolsa==="inversion")   b.inversion   -=m;
      if(e.deBolsa==="disponible")  b.disponible  -=m;
    }
  }
  return b;
}

// ── UI primitives ─────────────────────────────────────────────
const ic  ="input-field w-full rounded-2xl px-4 py-3 text-white text-sm";
const Inp =({label,...p})=><div className="mb-3"><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:4}}>{label}</label><input className={ic} {...p}/></div>;
const Sel =({label,opts,...p})=><div className="mb-3"><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:4}}>{label}</label><select className={ic} {...p}>{opts.map(o=><option key={o}>{o}</option>)}</select></div>;
const Txt =({label,...p})=><div className="mb-3"><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:4}}>{label}</label><textarea className={ic+" h-20 resize-none"} {...p}/></div>;
const PBtn=({danger,...p})=><button className={`w-full py-3.5 rounded-2xl font-bold text-sm text-white mb-2 active:scale-95 transition-transform ${danger?"btn-danger":"btn-primary"}`} {...p}/>;
const BC  ={"Por iniciar":"bg-slate-600","En curso":"bg-blue-600","Terminada":"bg-green-600","Perdido":"bg-red-700","Cotizado":"bg-yellow-600","Aprobado":"bg-green-600"};
const Badge=({s})=><span className={`text-xs px-2.5 py-0.5 rounded-full text-white font-semibold ${BC[s]||"bg-gray-700"}`}>{s}</span>;

function Sheet({open,onClose,title,children}){
  return(
    <div className={`fixed inset-0 z-50 ${open?"":"pointer-events-none"}`}
      style={{background:open?"rgba(0,0,0,0.75)":"transparent",transition:"background 0.3s"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className={`sheet-bg absolute bottom-0 inset-x-0 rounded-t-3xl transition-transform duration-300 ${open?"translate-y-0":"translate-y-full"}`}
        onClick={e=>e.stopPropagation()}>
        <div className="flex justify-center pt-3 pb-1"><div className="w-10 h-1 rounded-full bg-white/10"/></div>
        <div className="px-5" style={{overflowY:"auto",WebkitOverflowScrolling:"touch",maxHeight:"90vh",paddingBottom:"calc(env(safe-area-inset-bottom)+100px)"}}>
          <div className="flex justify-between items-center mb-5 pt-2">
            <h2 className="text-lg font-bold tracking-tight">{title}</h2>
            <button onClick={onClose} className="w-8 h-8 rounded-full bg-white/8 flex items-center justify-center text-gray-400 text-xl">×</button>
          </div>
          {children}
        </div>
      </div>
    </div>
  );
}

const Volver=({titulo,sub,onBack})=>(
  <div className="flex items-center gap-3 mb-4 pb-3" style={{borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
    <button onClick={onBack} style={{color:"#B87333",fontWeight:700,fontSize:22,background:"none",border:"none",cursor:"pointer",padding:"0 4px",lineHeight:1}}>‹</button>
    <div className="flex-1 min-w-0">
      <p className="font-bold text-base truncate">{titulo}</p>
      {sub&&<p className="text-xs text-gray-500 truncate">{sub}</p>}
    </div>
  </div>
);

function Toggle({on,onToggle,label,sub}){
  return(
    <div className="flex items-center justify-between py-2.5">
      <div className="flex-1 pr-3">
        <p className="text-sm text-gray-200">{label}</p>
        {sub&&<p className="text-xs text-gray-500">{sub}</p>}
      </div>
      <button onClick={onToggle}
        className={`relative w-12 h-6 rounded-full transition-colors flex-shrink-0 ${on?"bg-orange-500":"bg-gray-600"}`}>
        <span className="absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all"
          style={{left:on?"calc(100% - 22px)":"2px"}}/>
      </button>
    </div>
  );
}


// ── ProyectoDetalle ──────────────────────────────────────────
function ProyectoDetalle({obraId,obras,saveObras,config,caja,saveCaja,onBack}){
  const o=obras.find(x=>x.id===obraId);
  if(!o){onBack();return null;}
  const upd=patch=>saveObras(obras.map(x=>x.id===o.id?{...x,...patch}:x));
  const cfg={...DEF_CFG,...config};

  // Datos base
  const m2=n(o.m2);
  const tipo=getTipo(o);
  const precioM2=getPrecioM2(o,cfg);
  const ventaTejas=m2*precioM2;
  const tejasTotales=m2*TEJAS_M2;

  // Pagos Kaston
  const pagosKaston=o.pagosKaston||[];
  const totalCobrado=pagosKaston.reduce((s,p)=>s+n(p.monto),0);
  const pendiente=Math.max(0,ventaTejas-totalCobrado);

  // Mallas
  const {rollos,total:totalMallas}=calcRollos(m2,cfg);
  const listaCompras=o.listaCompras||[];

  // Favores
  const fondoFavores=n(o.fondoFavores);
  const listaFavores=o.listaFavores||[];
  const gastadoFavores=listaFavores.filter(i=>i.comprado).reduce((s,i)=>s+n(i.monto),0);

  // Contratistas — % por proyecto con fallback al global
  const pagoJG  =n(o.pagoJG);
  const pagoHerm=n(o.pagoHerm);
  const pctJG   =o.pctComJG  !==undefined&&o.pctComJG  !==""?n(o.pctComJG)  :(cfg.pctComisionJG  ||0);
  const pctHerm =o.pctComHerm!==undefined&&o.pctComHerm!==""?n(o.pctComHerm):(cfg.pctComisionHerm||0);
  const comJG   =pagoJG  *pctJG  /100;
  const comHerm =pagoHerm*pctHerm/100;

  // Local state
  const [pagoSh,setPagoSh]=useState(false);
  const [montoPago,setMontoPago]=useState("");
  const [nuevoFavor,setNuevoFavor]=useState({concepto:"",monto:""});
  const div=calcDisp(n(montoPago),m2,o,cfg);

  const registrarPago=()=>{
    const m=n(montoPago);
    if(!m||!div) return;
    upd({pagosKaston:[...pagosKaston,{id:uid(),monto:m,fecha:hoy(),desglose:div}]});
    saveCaja(prev=>[...prev,
      {id:uid(),tipo:"matPrima",    monto:div.matPrima,    concepto:`Mat.Prima — ${o.nombre}`,    fecha:hoy(),obraId:o.id},
      {id:uid(),tipo:"nomina",      monto:div.nomina,      concepto:`Nómina — ${o.nombre}`,       fecha:hoy(),obraId:o.id},
      {id:uid(),tipo:"costosFijos", monto:div.costosFijos, concepto:`Costos Fijos — ${o.nombre}`, fecha:hoy(),obraId:o.id},
      ...(div.inversion>0?[{id:uid(),tipo:"inversion",monto:div.inversion,concepto:`Fondo Crec. — ${o.nombre}`,fecha:hoy(),obraId:o.id}]:[]),
      {id:uid(),tipo:"utilLibre",   monto:div.utilLibre,   concepto:`Utilidad — ${o.nombre}`,    fecha:hoy(),obraId:o.id},
    ]);
    setMontoPago(""); setPagoSh(false);
  };

  const registrarMallas=()=>{
    if(o.mallasRegistradas) return;
    upd({mallasRegistradas:true});
    saveCaja(prev=>[...prev,{id:uid(),tipo:"mallas",monto:totalMallas,concepto:`Mallas — ${o.nombre}`,fecha:hoy(),obraId:o.id}]);
  };

  const toggleMallasSwitch=()=>{
    const next=!o.suministrarMallas;
    const lista=next&&rollos>0?[{id:uid(),concepto:`Comprar ${rollos} rollo${rollos>1?"s":""} Malla Electrosoldada 4mm`,monto:0,comprado:false}]:[];
    upd({suministrarMallas:next,listaCompras:lista,mallasRegistradas:false});
  };

  const toggleCompra=id=>upd({listaCompras:listaCompras.map(i=>i.id===id?{...i,comprado:!i.comprado}:i)});

  const addFavor=()=>{
    const c=nuevoFavor.concepto.trim();
    if(!c) return;
    upd({listaFavores:[...listaFavores,{id:uid(),concepto:c,monto:n(nuevoFavor.monto),comprado:false}]});
    setNuevoFavor({concepto:"",monto:""});
  };
  const toggleFavor=id=>upd({listaFavores:listaFavores.map(i=>i.id===id?{...i,comprado:!i.comprado}:i)});
  const delFavor  =id=>upd({listaFavores:listaFavores.filter(i=>i.id!==id)});

  return(
    <div className="p-4 fade-in" style={{paddingBottom:"calc(env(safe-area-inset-bottom)+96px)"}}>
      <Volver titulo={o.nombre} sub={o.cliente?"Cliente: "+o.cliente:o.direccion||""} onBack={onBack}/>

      <div className="flex items-center gap-2 mb-5 flex-wrap">
        <Badge s={o.estado||"Por iniciar"}/>
        {(()=>{const r=RUTAS[getRuta(o)];return r&&<span className={`text-xs px-2 py-0.5 rounded-full text-white font-semibold ${r.color}`}>{r.label}</span>;})()}
        <span className="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full">{tipo}</span>
        {m2>0&&<span className="text-xs text-gray-500">{m2} m² · {tejasTotales.toLocaleString()} tejas</span>}
      </div>

      {/* ══ A — SECCIÓN KASTON ═══════════════════════ */}
      <p className="section-label mb-2">A — Sección Kaston</p>

      {/* Venta de Tejas */}
      <div className="card rounded-2xl p-4 mb-3">
        <div className="flex justify-between items-start mb-3">
          <div>
            <p className="text-xs text-gray-500 mb-0.5">Venta de Tejas</p>
            <p className="text-2xl font-black text-white">{m2>0?fmt(ventaTejas):"—"}</p>
            {m2>0&&<p className="text-xs text-gray-600">{m2} m² × {fmt(precioM2)}/m²</p>}
          </div>
          {ventaTejas>0&&(
            <div className="text-right">
              <p className="text-[9px] text-gray-500 uppercase">Cobrado</p>
              <p className={`text-sm font-bold ${totalCobrado>=ventaTejas?"text-green-400":"text-white"}`}>{fmt(totalCobrado)}</p>
              {pendiente>0&&<p className="text-xs text-orange-400 mt-0.5">Faltan {fmt(pendiente)}</p>}
            </div>
          )}
        </div>

        {/* Historial de pagos */}
        {pagosKaston.length>0&&(
          <div className="border-t border-white/5 pt-3 mb-3">
            {pagosKaston.map((p,i)=>(
              <div key={p.id} className={`py-2.5 ${i<pagosKaston.length-1?"border-b border-white/5":""}`}>
                <div className="flex justify-between text-sm mb-2">
                  <span className="text-gray-500 text-xs">{p.fecha}</span>
                  <span className="text-green-400 font-bold">{fmt(p.monto)}</span>
                </div>
                {p.desglose&&(
                  <div className="grid grid-cols-4 gap-1">
                    {[
                      {l:"Mat.Prima",v:p.desglose.matPrima,c:"text-yellow-400"},
                      {l:"Nómina",   v:p.desglose.nomina,  c:"text-orange-400"},
                      {l:"C.Fijos",  v:p.desglose.costosFijos,c:"text-red-400"},
                      {l:"Inversión",v:p.desglose.inversion,c:"text-blue-400"},
                    ].map(({l,v,c})=>(
                      <div key={l} className="bg-black/30 rounded-xl p-1.5 text-center">
                        <p className="text-[8px] text-gray-500">{l}</p>
                        <p className={`text-[10px] font-semibold ${c}`}>{fmt(v)}</p>
                      </div>
                    ))}
                  </div>
                )}
                {p.desglose&&p.desglose.utilLibre>0&&(
                  <p className="text-xs text-green-400 mt-1.5">Utilidad libre: {fmt(p.desglose.utilLibre)}</p>
                )}
              </div>
            ))}
          </div>
        )}

        {ventaTejas>0&&(
          <button onClick={()=>setPagoSh(true)}
            className="btn-primary w-full py-3 rounded-2xl font-bold text-sm text-white active:scale-95 transition-transform">
            + Registrar pago recibido
          </button>
        )}
        {!m2&&<p className="text-xs text-gray-600 text-center py-1">Define los m² en "Editar datos" para calcular la venta.</p>}
      </div>

      {/* Switch Mallas */}
      <div className="card rounded-2xl p-4 mb-3">
        <Toggle on={o.suministrarMallas||false} onToggle={toggleMallasSwitch}
          label="Suministrar Materiales Base (Mallas)"
          sub={m2>0?`${rollos} rollo${rollos!==1?"s":""} Malla Electrosoldada · cobrar ${fmt(totalMallas)}`:"Define los m² primero"}/>
        {o.suministrarMallas&&m2>0&&(
          <div className="mt-3 border-t border-white/5 pt-3">
            <div className="rounded-xl p-3 mb-3 bg-orange-900/20 border border-orange-700/30">
              <p className="text-xs text-orange-400 font-semibold mb-0.5">Cobrar al cliente por mallas</p>
              <p className="text-xl font-black text-orange-300">{fmt(totalMallas)}</p>
              <p className="text-xs text-gray-600">{rollos} rollo{rollos!==1?"s":""} × {fmt(cfg.precioMallaRollo)}/rollo</p>
            </div>
            {listaCompras.map(item=>(
              <div key={item.id} className="flex items-center gap-2 py-2 border-b border-gray-800 last:border-0">
                <button onClick={()=>toggleCompra(item.id)}
                  className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition ${item.comprado?"bg-green-600 border-green-600":"border-gray-500"}`}>
                  {item.comprado&&<span className="text-white text-xs">✓</span>}
                </button>
                <span className={`text-sm flex-1 ${item.comprado?"line-through text-gray-500":""}`}>{item.concepto}</span>
              </div>
            ))}
            {!o.mallasRegistradas?(
              <button onClick={registrarMallas}
                className="mt-3 w-full py-2.5 rounded-xl bg-green-800 text-white text-xs font-bold active:scale-95 transition-transform">
                ✓ Registrar cobro de mallas al cliente ({fmt(totalMallas)})
              </button>
            ):(
              <p className="text-xs text-green-400 text-center mt-3 py-2">✓ Cobro de mallas registrado — {fmt(totalMallas)}</p>
            )}
          </div>
        )}
      </div>

      {/* ══ B — FAVORES ══════════════════════════════ */}
      <p className="section-label mb-2">B — Favores de Compra y Logística</p>

      <div className="card rounded-2xl p-4 mb-3">
        <Toggle on={o.favorActivo||false} onToggle={()=>upd({favorActivo:!o.favorActivo})}
          label="Favores de compra y logística"
          sub="Cuentas de paso — no suma a ingresos Kaston"/>
        {o.favorActivo&&(
          <div className="mt-3 border-t border-white/5 pt-3">
            <Inp label="Dinero recibido del cliente para favores (COP)" type="number"
              value={o.fondoFavores||""} onChange={e=>upd({fondoFavores:e.target.value})} placeholder="0"/>
            {fondoFavores>0&&(
              <div className={`rounded-xl p-3 mb-3 ${fondoFavores-gastadoFavores>=0?"bg-blue-900/20 border border-blue-700/30":"bg-red-900/20 border border-red-700/40"}`}>
                <p className="text-xs text-gray-400 mb-0.5">Fondos de Terceros Disponibles</p>
                <p className={`text-xl font-black ${fondoFavores-gastadoFavores>=0?"text-blue-200":"text-red-400"}`}>
                  {fmt(fondoFavores-gastadoFavores)}
                </p>
                <p className="text-[10px] text-gray-600">Recibido: {fmt(fondoFavores)} · Gastado: {fmt(gastadoFavores)}</p>
              </div>
            )}
            {listaFavores.map(item=>(
              <div key={item.id} className="flex items-center gap-2 py-2 border-b border-gray-800">
                <button onClick={()=>toggleFavor(item.id)}
                  className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition ${item.comprado?"bg-green-600 border-green-600":"border-gray-500"}`}>
                  {item.comprado&&<span className="text-white text-xs">✓</span>}
                </button>
                <span className={`text-sm flex-1 ${item.comprado?"line-through text-gray-500":""}`}>{item.concepto}</span>
                {item.monto>0&&<span className={`text-sm font-medium flex-shrink-0 ${item.comprado?"text-gray-600":"text-gray-300"}`}>{fmt(item.monto)}</span>}
                <button onClick={()=>delFavor(item.id)} className="text-red-500 text-lg ml-1 flex-shrink-0 leading-none">×</button>
              </div>
            ))}
            <div className="flex gap-2 mt-3">
              <input className={ic+" flex-1"} placeholder="¿Qué hay que comprar?" value={nuevoFavor.concepto}
                onChange={e=>setNuevoFavor({...nuevoFavor,concepto:e.target.value})}
                onKeyDown={e=>{if(e.key==="Enter")addFavor();}}/>
              <input className={ic+" w-28"} type="number" placeholder="$" value={nuevoFavor.monto}
                onChange={e=>setNuevoFavor({...nuevoFavor,monto:e.target.value})}/>
              <button onClick={addFavor} className="btn-primary rounded-xl px-4 text-white font-bold text-xl flex-shrink-0">+</button>
            </div>
          </div>
        )}
      </div>

      {/* ══ C — CONTRATISTAS ══════════════════════════ */}
      <p className="section-label mb-2">C — Contratistas</p>

      {/* Ruta B: sin contratistas externos */}
      {getRuta(o)==="B"&&(
        <div className="card rounded-2xl p-4 mb-5 flex items-center gap-3">
          <span className="text-2xl">🏗️</span>
          <div>
            <p className="text-sm font-semibold text-gray-200">Sin contratistas externos</p>
            <p className="text-xs text-gray-500">Ruta B — La base ya está construida. KASTON instala directamente.</p>
          </div>
        </div>
      )}

      {/* Ruta A: switch de excepción estructural */}
      {getRuta(o)==="A"&&(
        <div className="card rounded-2xl p-4 mb-3">
          <Toggle on={o.requiereEstructural||false}
            onToggle={()=>upd({requiereEstructural:!o.requiereEstructural})}
            label="¿Requiere arreglos estructurales / quitar peso al techo?"
            sub="Activa las tarjetas de Juan Guillermo y Hermilson para esta obra"/>
          {!(o.requiereEstructural)&&(
            <p className="text-xs text-gray-600 mt-2">Sin arreglos estructurales — Ruta A estándar.</p>
          )}
        </div>
      )}

      {/* Tarjetas de contratistas (Ruta C siempre · Ruta A solo si switch activo) */}
      {mostrarContratistas(o)&&(
        <>
          {[
            {
              key:"jg", dot:"bg-blue-500", nombre:"Juan Guillermo", rol:"Cubierta de madera",
              campoPago:"pagoJG", campoPct:"pctComJG",
              campoAntPct:"pctAnticipoJG", campoAntPag:"pagoAnticipoJG", campoSalPag:"pagoSaldoJG",
              campoRecibida:"comJGRecibida", campoFecha:"comJGFecha",
              pago:pagoJG, pct:pctJG, com:comJG, recibida:o.comJGRecibida||false, fecha:o.comJGFecha||"",
              pctAnticipo: o.pctAnticipoJG!==undefined&&o.pctAnticipoJG!==""?n(o.pctAnticipoJG):50,
              pagoAnticipo: o.pagoAnticipoJG||false,
              pagoSaldo:    o.pagoSaldoJG   ||false,
            },
            {
              key:"herm", dot:"bg-purple-500", nombre:"Hermilson", rol:"Mampostería y obra civil",
              campoPago:"pagoHerm", campoPct:"pctComHerm",
              campoAntPct:"pctAnticipoHerm", campoAntPag:"pagoAnticipoHerm", campoSalPag:"pagoSaldoHerm",
              campoRecibida:"comHermRecibida", campoFecha:"comHermFecha",
              pago:pagoHerm, pct:pctHerm, com:comHerm, recibida:o.comHermRecibida||false, fecha:o.comHermFecha||"",
              pctAnticipo: o.pctAnticipoHerm!==undefined&&o.pctAnticipoHerm!==""?n(o.pctAnticipoHerm):50,
              pagoAnticipo: o.pagoAnticipoHerm||false,
              pagoSaldo:    o.pagoSaldoHerm   ||false,
            },
          ].map(ct=>{
            const pctSaldo    = Math.max(0, 100 - ct.pctAnticipo);
            const valAnticipo = ct.pago * ct.pctAnticipo / 100;
            const valSaldo    = ct.pago * pctSaldo / 100;
            const estado      = ct.pagoSaldo && ct.pagoAnticipo
              ? {l:"Contrato Liquidado",               c:"text-green-400",  bg:"bg-green-900/20 border-green-700/30"}
              : ct.pagoAnticipo
              ? {l:"Anticipo Pagado — Obra en Curso",  c:"text-yellow-400", bg:"bg-yellow-900/20 border-yellow-700/30"}
              : {l:"Sin abonar",                       c:"text-gray-500",   bg:"bg-gray-800/50 border-gray-700/30"};

            return (
              <div key={ct.key} className="card rounded-2xl p-4 mb-3">

                {/* Encabezado + estado */}
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <div className={`w-2 h-2 rounded-full ${ct.dot} flex-shrink-0`}/>
                    <p className="font-bold text-sm">{ct.nombre}</p>
                    <span className="text-xs text-gray-500">— {ct.rol}</span>
                  </div>
                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${estado.bg} ${estado.c}`}>
                    {estado.l}
                  </span>
                </div>

                {/* Valor total del contrato */}
                <Inp label={`Valor total acordado cliente → ${ct.nombre} (COP)`} type="number"
                  value={o[ct.campoPago]||""} onChange={e=>upd({[ct.campoPago]:e.target.value})} placeholder="0"/>

                {ct.pago>0&&(
                  <>
                    {/* % Comisión Kaston editable */}
                    <div className="flex items-center gap-2 mb-4 p-2.5 bg-black/20 rounded-xl">
                      <span className="text-xs text-gray-400 flex-1">% Comisión Kaston (esta obra)</span>
                      <input type="number" min="0" max="100"
                        className="w-14 bg-gray-800 border border-gray-700 rounded-xl px-2 py-1.5 text-white text-sm text-center outline-none focus:ring-1 focus:ring-orange-500"
                        value={o[ct.campoPct]!==undefined&&o[ct.campoPct]!==""?o[ct.campoPct]:ct.pct}
                        onChange={e=>upd({[ct.campoPct]:e.target.value})}/>
                      <span className="text-gray-400 text-xs">%</span>
                      <span className="text-orange-400 font-bold text-sm">{fmt(ct.com)}</span>
                    </div>

                    {/* ── Fases de pago ───────────────────────── */}
                    <p className="section-label mb-2">Fases de pago del cliente</p>

                    {/* Porcentajes */}
                    <div className="flex gap-2 mb-3">
                      <div className="flex-1 bg-black/20 rounded-xl p-3">
                        <p className="text-[9px] text-gray-500 uppercase mb-1.5">% Anticipo Inicial</p>
                        <div className="flex items-center gap-1">
                          <input type="number" min="0" max="100"
                            className="w-14 bg-gray-800 border border-gray-700 rounded-xl px-2 py-1.5 text-white text-sm text-center outline-none focus:ring-1 focus:ring-orange-500"
                            value={o[ct.campoAntPct]!==undefined&&o[ct.campoAntPct]!==""?o[ct.campoAntPct]:ct.pctAnticipo}
                            onChange={e=>upd({[ct.campoAntPct]:e.target.value})}/>
                          <span className="text-gray-400 text-xs">%</span>
                        </div>
                        <p className="text-xs font-bold text-white mt-1.5">{fmt(valAnticipo)}</p>
                      </div>
                      <div className="flex-1 bg-black/20 rounded-xl p-3">
                        <p className="text-[9px] text-gray-500 uppercase mb-1.5">% Saldo Final (auto)</p>
                        <div className="flex items-center gap-1">
                          <div className="w-14 bg-gray-900 border border-gray-700/50 rounded-xl px-2 py-1.5 text-gray-400 text-sm text-center">{pctSaldo}</div>
                          <span className="text-gray-500 text-xs">%</span>
                        </div>
                        <p className="text-xs font-bold text-white mt-1.5">{fmt(valSaldo)}</p>
                      </div>
                    </div>

                    {/* Checkboxes de fases */}
                    <div className="space-y-2 mb-4">
                      {[
                        {campo:ct.campoAntPag, marcado:ct.pagoAnticipo, label:`¿Cliente pagó Anticipo de Inicio?`, val:valAnticipo,
                         labelOk:"✓ Anticipo de Inicio pagado", colOk:"bg-yellow-900/25 border-yellow-700/40 text-yellow-300",
                         colNo:"bg-gray-900/50 border-gray-700/50 text-gray-400", chkOk:"bg-yellow-500 border-yellow-500"},
                        {campo:ct.campoSalPag, marcado:ct.pagoSaldo,    label:`¿Cliente pagó Saldo de Finalización?`, val:valSaldo,
                         labelOk:"✓ Saldo de Finalización pagado", colOk:"bg-green-900/25 border-green-700/40 text-green-300",
                         colNo:"bg-gray-900/50 border-gray-700/50 text-gray-400", chkOk:"bg-green-600 border-green-600"},
                      ].map(({campo,marcado,label,val,labelOk,colOk,colNo,chkOk})=>(
                        <button key={campo} onClick={()=>upd({[campo]:!marcado})}
                          className={`w-full flex items-center gap-3 py-2.5 px-3 rounded-xl border transition text-left ${marcado?colOk:colNo}`}>
                          <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition ${marcado?chkOk:"border-gray-500"}`}>
                            {marcado&&<span className="text-white text-xs font-bold">✓</span>}
                          </div>
                          <div className="flex-1 min-w-0">
                            <p className="text-xs font-semibold">{marcado?labelOk:label}</p>
                            <p className="text-[10px] opacity-70">{fmt(val)}</p>
                          </div>
                        </button>
                      ))}
                    </div>

                    {/* ── Comisión Kaston ──────────────────────── */}
                    <div className="border-t border-white/5 pt-3">
                      {!ct.recibida?(
                        <div className="rounded-xl p-3 bg-orange-900/30 border border-orange-700/50">
                          <p className="text-orange-300 text-xs font-bold mb-0.5">⚠ Comisión pendiente</p>
                          <p className="text-orange-200 text-xs mb-3">{ct.nombre} debe {fmt(ct.com)} a Kaston.</p>
                          <button onClick={()=>upd({[ct.campoRecibida]:true,[ct.campoFecha]:hoy()})}
                            className="w-full py-2.5 rounded-xl bg-orange-600 text-white text-xs font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
                            <div className="w-4 h-4 rounded border-2 border-white/50 flex-shrink-0"/>
                            ¿Comisión recibida por Kaston?
                          </button>
                        </div>
                      ):(
                        <div className="rounded-xl p-3 bg-green-900/30 border border-green-700/40 flex items-center justify-between">
                          <div>
                            <p className="text-green-400 text-xs font-bold">✓ Comisión recibida por Kaston</p>
                            <p className="text-green-300 text-xs">{fmt(ct.com)}{ct.fecha?" · "+ct.fecha:""}</p>
                          </div>
                          <button onClick={()=>upd({[ct.campoRecibida]:false,[ct.campoFecha]:""})}
                            className="text-xs text-gray-500 underline">Revertir</button>
                        </div>
                      )}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </>
      )}

      {/* ── Sheet: Divisor Automático ──────────────── */}
      <Sheet open={pagoSh} onClose={()=>{setPagoSh(false);setMontoPago("");}} title="Divisor Automático Kaston">
        <p className="text-xs text-gray-400 mb-4">
          Venta total: <strong className="text-white">{fmt(ventaTejas)}</strong> · {Math.round(tejasTotales).toLocaleString()} tejas
        </p>
        <Inp label="Monto recibido (COP)" type="number"
          value={montoPago} onChange={e=>setMontoPago(e.target.value)} placeholder="0"/>
        {div&&(
          <>
            <p className="text-xs text-gray-500 mb-3">{Math.round(div.tejas).toLocaleString()} tejas equivalentes</p>
            <div className="card rounded-2xl p-4 mb-4">
              <p className="text-xs text-gray-400 uppercase tracking-wider mb-3">Dispersión automática</p>
              <div className="flex justify-between text-sm py-2 border-b border-white/5 font-semibold">
                <span className="text-gray-200">Total recibido</span>
                <span className="text-white font-bold">{fmt(n(montoPago))}</span>
              </div>
              {[
                {l:"Bolsa Materia Prima",sub:`${Math.round(div.tejas).toLocaleString()} tejas × ${fmt(cfg.costoMaterial)}`,v:div.matPrima,c:"text-yellow-400"},
                {l:"Bolsa Nómina Trabajador",sub:`× ${fmt(cfg.costoTrabajador)}/teja`,v:div.nomina,c:"text-orange-400"},
                {l:"Bolsa Costos Fijos",sub:`× ${fmt((cfg.costoArriendo||70)+(cfg.costoLuz||133))}/teja (arr.+luz)`,v:div.costosFijos,c:"text-red-400"},
              ].map(({l,sub,v,c})=>(
                <div key={l} className="py-2 border-b border-white/5">
                  <div className="flex justify-between">
                    <span className="text-sm text-gray-400">— {l}</span>
                    <span className={`text-sm font-semibold ${c}`}>{fmt(v)}</span>
                  </div>
                  <p className="text-[10px] text-gray-600">{sub}</p>
                </div>
              ))}
              <div className="flex justify-between py-2.5 border-b border-white/5 font-bold">
                <span className="text-gray-200">= Utilidad Neta</span>
                <span className={div.utilNeta>=0?"text-green-400":"text-red-400"}>{fmt(div.utilNeta)}</span>
              </div>
              <div className="py-2 border-b border-white/5">
                <div className="flex justify-between">
                  <span className="text-sm text-gray-400">— Fondo de Crecimiento</span>
                  <span className="text-sm font-semibold text-blue-400">{fmt(div.inversion)}</span>
                </div>
                <p className="text-[10px] text-gray-600">{cfg.pctInversion}% de la utilidad neta — no se toca</p>
              </div>
              <div className="flex justify-between py-3 font-black text-base">
                <span className="text-white">= Utilidad Libre</span>
                <span className={div.utilLibre>=0?"text-green-400":"text-red-400"}>{fmt(div.utilLibre)}</span>
              </div>
            </div>
          </>
        )}
        <PBtn onClick={registrarPago} disabled={!div}>Confirmar y dispersar</PBtn>
      </Sheet>
    </div>
  );
}

// ── ProyectosTab ─────────────────────────────────────────────
function ProyectosTab({obras,saveObras,clientes,config,caja,saveCaja}){
  const [vista,setVista]=useState("lista");
  const [obraId,setObraId]=useState(null);
  const [sh,setSh]=useState(false);
  const blank={nombre:"",cliente:"",direccion:"",m2:"",ruta:"A",tipoContrato:"Únicamente La Teja",estado:"Por iniciar",notas:""};
  const [f,setF]=useState(blank);
  const upd=k=>e=>setF({...f,[k]:e.target.value});
  const cfg={...DEF_CFG,...config};

  const openForm=o=>{
    setF(o?{id:o.id,nombre:o.nombre||"",cliente:o.cliente||"",direccion:o.direccion||"",
      m2:o.m2||"",ruta:getRuta(o),tipoContrato:getTipo(o),estado:o.estado||"Por iniciar",notas:o.notas||""}:blank);
    setSh(true);
  };

  const guardar=()=>{
    if(!f.nombre.trim()) return;
    if(f.id) saveObras(obras.map(o=>o.id===f.id?{...o,...f}:o));
    else saveObras([{...f,id:uid(),fecha:hoy(),
      requiereEstructural:false,
      suministrarMallas:false,listaCompras:[],mallasRegistradas:false,
      favorActivo:false,fondoFavores:"",listaFavores:[],
      pagoJG:"",pagoHerm:"",comJGRecibida:false,comHermRecibida:false,
      pagosKaston:[]},...obras]);
    setSh(false);
  };
  const del=()=>{saveObras(obras.filter(o=>o.id!==f.id));setSh(false);};

  if(vista==="detalle"&&obraId) return(
    <ProyectoDetalle obraId={obraId} obras={obras} saveObras={saveObras}
      config={config} caja={caja} saveCaja={saveCaja}
      onBack={()=>{setVista("lista");setObraId(null);}}/>
  );

  const resumen=o=>{
    const m2=n(o.m2);
    const venta=m2*getPrecioM2(o,cfg);
    const cobrado=(o.pagosKaston||[]).reduce((s,p)=>s+n(p.monto),0);
    // Solo muestra alerta de comisión si la ruta activa contratistas
    const tieneContr=mostrarContratistas(o);
    const pJG  =o.pctComJG  !==undefined&&o.pctComJG  !==""?n(o.pctComJG)  :(cfg.pctComisionJG  ||0);
    const pHerm=o.pctComHerm!==undefined&&o.pctComHerm!==""?n(o.pctComHerm):(cfg.pctComisionHerm||0);
    const comJGPend=tieneContr&&n(o.pagoJG)>0&&pJG>0&&!o.comJGRecibida;
    const comHPend =tieneContr&&n(o.pagoHerm)>0&&pHerm>0&&!o.comHermRecibida;
    return {venta,cobrado,pendiente:Math.max(0,venta-cobrado),comPend:comJGPend||comHPend};
  };

  return(
    <div className="p-4">
      <div className="flex justify-end mb-4">
        <button onClick={()=>openForm()} className="btn-primary w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl text-white">+</button>
      </div>
      {obras.length===0&&<p className="text-gray-500 text-center mt-16 text-sm">Sin proyectos. Toca + para crear uno.</p>}
      {obras.map(o=>{
        const r=resumen(o);
        return(
          <div key={o.id} className="card card-hover rounded-2xl p-4 mb-3 cursor-pointer" onClick={()=>{setObraId(o.id);setVista("detalle");}}>
            <div className="flex justify-between items-start mb-1">
              <p className="font-semibold flex-1 pr-2">{o.nombre}</p>
              <div className="flex items-center gap-1.5">
                {r.comPend&&<span className="w-2 h-2 rounded-full bg-orange-500 pulse flex-shrink-0"/>}
                <Badge s={o.estado||"Por iniciar"}/>
              </div>
            </div>
            {o.cliente&&<p className="text-sm text-gray-400">Cliente: {o.cliente}</p>}
            {n(o.m2)>0&&(
              <div className="mt-2 flex gap-3 flex-wrap">
                <div><p className="text-[9px] text-gray-500 uppercase">Venta</p><p className="text-xs font-semibold text-white">{fmt(r.venta)}</p></div>
                <div><p className="text-[9px] text-gray-500 uppercase">Cobrado</p><p className={`text-xs font-semibold ${r.cobrado>=r.venta&&r.venta>0?"text-green-400":"text-white"}`}>{fmt(r.cobrado)}</p></div>
                {r.pendiente>0&&<div><p className="text-[9px] text-gray-500 uppercase">Pendiente</p><p className="text-xs font-semibold text-orange-400">{fmt(r.pendiente)}</p></div>}
              </div>
            )}
            <div className="mt-2 flex gap-2 items-center flex-wrap">
              {(()=>{const rt=RUTAS[getRuta(o)];return rt&&<span className={`text-[10px] px-1.5 py-0.5 rounded-full text-white ${rt.color}`}>{rt.label}</span>;})()}
              <span className="text-[10px] text-gray-600">{getTipo(o)}</span>
              {n(o.m2)>0&&<span className="text-[10px] text-gray-600">· {o.m2} m²</span>}
              {r.comPend&&<span className="text-[10px] text-orange-400">⚠ Comisión pendiente</span>}
            </div>
            <button onClick={e=>{e.stopPropagation();openForm(o);}} className="mt-2 text-[10px] text-gray-600 underline">Editar datos</button>
          </div>
        );
      })}

// ── ComisionesTab ─────────────────────────────────────────────
function ComisionesTab({obras,saveObras,config}){
  const cfg={...DEF_CFG,...config};
  const items=[];
  obras.forEach(o=>{
    if(!mostrarContratistas(o)) return;
    // Usa % por proyecto si está definido, si no el global
    const pJG  =o.pctComJG  !==undefined&&o.pctComJG  !==""?n(o.pctComJG)  :(cfg.pctComisionJG  ||0);
    const pHerm=o.pctComHerm!==undefined&&o.pctComHerm!==""?n(o.pctComHerm):(cfg.pctComisionHerm||0);
    const jg   =n(o.pagoJG)  *pJG  /100;
    const herm =n(o.pagoHerm)*pHerm/100;
    if(jg>0)   items.push({key:o.id+"-jg",  obraId:o.id,obra:o.nombre,quien:"Juan Guillermo",
      pago:n(o.pagoJG),  pct:pJG,  monto:jg,
      recibida:o.comJGRecibida  ||false, fecha:o.comJGFecha  ||"",
      campo:"comJGRecibida",  campoFecha:"comJGFecha",
      clientePago:o.clientePagoJG  ||false});
    if(herm>0) items.push({key:o.id+"-herm",obraId:o.id,obra:o.nombre,quien:"Hermilson",
      pago:n(o.pagoHerm),pct:pHerm,monto:herm,
      recibida:o.comHermRecibida||false, fecha:o.comHermFecha||"",
      campo:"comHermRecibida",campoFecha:"comHermFecha",
      clientePago:o.clientePagoHerm||false});
  });
  const pend=items.filter(i=>!i.recibida);
  const hist=items.filter(i=>i.recibida);
  const total=pend.reduce((s,i)=>s+i.monto,0);

  const marcar  =item=>saveObras(obras.map(o=>o.id===item.obraId?{...o,[item.campo]:true,[item.campoFecha]:hoy()}:o));
  const revertir=item=>saveObras(obras.map(o=>o.id===item.obraId?{...o,[item.campo]:false,[item.campoFecha]:""}:o));

  const Fila=({item,cobrada=false})=>(
    <div className={`card rounded-2xl p-4 mb-3 ${cobrada?"opacity-60":""}`}>
      <div className="flex justify-between items-start mb-2">
        <div className="flex-1 min-w-0 pr-3">
          <p className="font-semibold text-sm">{item.obra}</p>
          <p className="text-xs text-gray-500">{item.quien} · {item.pct}% de {fmt(item.pago)}</p>
          {item.clientePago&&<p className="text-[10px] text-blue-400 mt-0.5">✓ Cliente ya le pagó al contratista</p>}
        </div>
        <span className={`text-xl font-black flex-shrink-0 ${cobrada?"text-gray-500":"text-orange-400"}`}>{fmt(item.monto)}</span>
      </div>
      {!cobrada?(
        <button onClick={()=>marcar(item)}
          className="w-full py-2.5 rounded-xl bg-orange-700 text-white text-xs font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
          <div className="w-4 h-4 rounded border-2 border-white/50 flex-shrink-0"/>
          ¿Comisión recibida por Kaston?
        </button>
      ):(
        <div className="flex items-center justify-between">
          <div>
            <p className="text-xs text-green-400 font-semibold">✓ Recibida por Kaston{item.fecha?" · "+item.fecha:""}</p>
          </div>
          <button onClick={()=>revertir(item)} className="text-xs text-gray-600 underline">Revertir</button>
        </div>
      )}
    </div>
  );

  return(
    <div className="p-4" style={{paddingBottom:"calc(env(safe-area-inset-bottom)+96px)"}}>
      {/* Total pendiente */}
      {total>0&&(
        <div className="card rounded-2xl p-5 mb-5 text-center" style={{borderColor:"rgba(234,88,12,0.4)"}}>
          <p className="text-xs text-gray-400 uppercase tracking-wider mb-2">Total Comisiones por Recibir</p>
          <p className="text-4xl font-black text-orange-400">{fmt(total)}</p>
          <p className="text-xs text-gray-500 mt-1">{pend.length} comisión{pend.length!==1?"es":""} pendiente{pend.length!==1?"s":""}</p>
        </div>
      )}
      {total===0&&hist.length===0&&(
        <div className="text-center mt-20">
          <p className="text-gray-500 text-sm">Sin comisiones registradas.</p>
          <p className="text-xs text-gray-600 mt-1">Entra a un proyecto y completa los valores acordados con los contratistas.</p>
        </div>
      )}
      {total===0&&hist.length>0&&(
        <div className="card rounded-2xl p-4 mb-5 text-center" style={{borderColor:"rgba(34,197,94,0.25)"}}>
          <p className="text-xs text-green-400 uppercase tracking-wider mb-1">Todo cobrado</p>
          <p className="text-2xl font-black text-green-300">{fmt(hist.reduce((s,i)=>s+i.monto,0))}</p>
        </div>
      )}

      {/* Pendientes */}
      {pend.length>0&&(
        <><p className="section-label mb-3">Por cobrar</p>{pend.map(i=><Fila key={i.key} item={i}/>)}</>
      )}

      {/* Historial cobradas */}
      {hist.length>0&&(
        <>
          <p className="section-label mb-3 mt-5">Historial de Comisiones Cobradas</p>
          {hist.map(i=><Fila key={i.key} item={i} cobrada/>)}
        </>
      )}
    </div>
  );
}

    const m=n(f.monto);
    if(!f.concepto.trim()||!m) return;
    saveCaja(prev=>[...prev,{...f,id:uid(),monto:m,tipo:"gastoManual",manual:true}]);
    setF(blank); setSh(false);

              {v:"matPrima",    l:"Materia Prima"},
              {v:"inversion",   l:"Fondo Crecimiento"},
              {v:"disponible",  l:"Balance Disponible"},

          style={{background:"linear-gradient(135deg,#166534,#15803d)"}}>
          Exportar proyectos a Excel
        </button>
      </div>
    </Sheet>
  );
}

// ── Login ─────────────────────────────────────────────────────
function Login({onLogin}){
  const [digits,setDigits]=useState("");
  const [shake,setShake]=useState(false);
  const tap=d=>{
    if(digits.length>=PIN_CODE.length) return;
    const next=digits+d; setDigits(next);
    if(next.length===PIN_CODE.length){
      if(next===PIN_CODE){localStorage.setItem("kastAuth","1");setTimeout(onLogin,180);}
      else{setShake(true);setTimeout(()=>{setDigits("");setShake(false);},700);}
    }
  };
  const del=()=>setDigits(d=>d.slice(0,-1));
  const keys=[1,2,3,4,5,6,7,8,9,null,0,"⌫"];
  return(
    <div style={{background:"radial-gradient(ellipse at top,#120e04 0%,#080808 60%)",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
      <div style={{width:"100%",maxWidth:320}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{position:"relative",width:96,height:96,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{position:"absolute",inset:0,borderRadius:"50%",background:"radial-gradient(circle,rgba(184,115,51,0.15),transparent 70%)"}}/>
            <img src="logo.svg" alt="Kaston" style={{width:80,height:80,objectFit:"contain"}}/>
          </div>
          <h1 style={{color:"white",fontWeight:900,fontSize:30,letterSpacing:"0.18em",margin:"0 0 6px"}}>KASTON</h1>
          <p style={{color:"#B87333",fontSize:10,fontWeight:600,letterSpacing:"0.1em",opacity:0.8,margin:0}}>GESTIÓN PRIVADA</p>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:36,transform:shake?"translateX(-8px)":"none",transition:"transform 0.07s"}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:14,height:14,borderRadius:"50%",border:"2px solid #B87333",background:digits.length>i?"#B87333":"transparent",transition:"background 0.15s"}}/>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          {keys.map((k,i)=>(
            <button key={i} onClick={()=>k===null?null:k==="⌫"?del():tap(String(k))}
              style={{padding:"18px 0",borderRadius:18,background:k===null?"transparent":"#1c1c1c",border:k===null?"none":"1px solid rgba(255,255,255,0.08)",color:k==="⌫"?"#9ca3af":"white",fontSize:k==="⌫"?20:22,fontWeight:600,cursor:k===null?"default":"pointer",WebkitTapHighlightColor:"transparent",transition:"background 0.1s",userSelect:"none"}}
              onTouchStart={e=>{if(k!==null)e.currentTarget.style.background="#2a2a2a";}}
              onTouchEnd={e=>{if(k!==null)e.currentTarget.style.background=k===null?"transparent":"#1c1c1c";}}
            >{k===null?"":k}</button>
          ))}
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.12)",marginTop:28}}>Solo para uso autorizado</p>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [auth,setAuth]            =useState(()=>localStorage.getItem("kastAuth")==="1");
  const [tab,setTab]              =useState(0);
  const [cfgSh,setCfgSh]          =useState(false);
  const [dbStatus,setDbStatus]    =useState("?");
  const [clientes,,rC]            =useStore("kaston_clientes");
  const [obras,saveObr,rO]        =useStore("kaston_obras");
  const [,,,rG]                   =[...useStore("kaston_gastos"),true]; // compat — no usado
  const [config,saveConf,rConf]   =useStore("kaston_config",DEF_CFG);
  const [caja,saveCaja,rCaja]     =useStore("kaston_caja",[]);

  useEffect(()=>{if(auth)dbPing().then(ok=>setDbStatus(ok?"✓":"✗"));},[auth]);

  if(!auth) return <Login onLogin={()=>setAuth(true)}/>;
  if(!rC||!rO||!rConf||!rCaja) return(
    <div style={{background:"#080808"}} className="min-h-screen flex items-center justify-center text-white">
      <div className="text-center">
        <div className="btn-primary w-14 h-14 rounded-2xl flex items-center justify-center text-xl font-black mx-auto mb-4">K</div>
        <p className="text-sm tracking-widest" style={{color:"rgba(255,255,255,0.4)"}}>CARGANDO</p>
      </div>
    </div>
  );

  const cfg={...DEF_CFG,...config};
  const comBadge=obras.filter(o=>{
    if(!mostrarContratistas(o)) return false;
    const cj=n(o.pagoJG)  *(cfg.pctComisionJG  ||0)/100>0&&!o.comJGRecibida;
    const ch=n(o.pagoHerm)*(cfg.pctComisionHerm||0)/100>0&&!o.comHermRecibida;
    return cj||ch;
  }).length;

  const tabLabels=["Proyectos","Comisiones","Caja KASTON"];
  const TABS=[
    {l:"Proyectos",icon:(
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 21h18M3 10h18M5 21V7l7-4 7 4v14"/><rect x="9" y="13" width="6" height="8" rx="1"/>
      </svg>
    )},
    {l:"Comisiones",badge:comBadge,icon:(
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
      </svg>
    )},
    {l:"Caja",icon:(
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h4"/>
      </svg>
    )},
  ];

  return(
    <div style={{background:"#080808",maxWidth:480,margin:"0 auto"}} className="min-h-screen text-white flex flex-col">
      <div className="header-bg px-4 pb-3 flex items-center gap-3"
        style={{paddingTop:"max(env(safe-area-inset-top),12px)",position:"sticky",top:0,zIndex:40}}>
        <div className="flex items-center gap-2.5 flex-1">
          <img src="logo.svg" alt="Kaston" style={{height:34,width:"auto",objectFit:"contain"}}/>
          <div>
            <div className="text-white font-black" style={{fontSize:16,letterSpacing:"0.16em",lineHeight:1.2}}>KASTON</div>
            <div style={{fontSize:10,color:"#B87333",opacity:0.75,letterSpacing:"0.04em",marginTop:2}}>{tabLabels[tab]}</div>
          </div>
        </div>
        <span style={{width:7,height:7,borderRadius:"50%",background:dbStatus==="✓"?"#22c55e":dbStatus==="✗"?"#ef4444":"#555",display:"inline-block",flexShrink:0}}/>
        <button onClick={()=>setCfgSh(true)} className="w-8 h-8 rounded-full flex items-center justify-center"
          style={{background:"rgba(255,255,255,0.06)"}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>

      <div className="flex-1 pb-24 fade-in">
        {tab===0&&<ProyectosTab obras={obras} saveObras={saveObr} clientes={clientes} config={config} caja={caja} saveCaja={saveCaja}/>}
        {tab===1&&<ComisionesTab obras={obras} saveObras={saveObr} config={config}/>}
        {tab===2&&<CajaTab caja={caja} saveCaja={saveCaja}/>}
      </div>

      <div className="tab-bar safe-bottom fixed bottom-0 flex no-select"
        style={{maxWidth:480,left:"50%",transform:"translateX(-50%)",width:"100%"}}>
        {TABS.map(({l,badge,icon},i)=>(
          <button key={i} onClick={()=>setTab(i)} className="flex-1 py-2 flex flex-col items-center relative transition-all">
            <div className="tab-icon-wrap"
              style={{color:tab===i?"#B87333":"#4b5563",background:tab===i?"rgba(184,115,51,0.12)":"transparent"}}>
              {icon}
              <span style={{fontSize:8,fontWeight:700,letterSpacing:"0.05em",opacity:tab===i?1:0,height:tab===i?10:0,overflow:"hidden",transition:"all 0.15s",textTransform:"uppercase"}}>{l}</span>
            </div>
            {badge>0&&<span className="absolute top-1.5 right-1/4 text-white rounded-full w-4 h-4 flex items-center justify-center font-bold"
              style={{background:"#B87333",fontSize:9}}>{badge}</span>}
          </button>
        ))}
      </div>

      <ConfigSheet open={cfgSh} onClose={()=>setCfgSh(false)}
        config={config} saveConfig={saveConf} obras={obras} clientes={clientes}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
