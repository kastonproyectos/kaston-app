<script type="text/babel">
const { useState, useEffect } = React;

const SB_URL = "https://rntjainqdzgttikmuxmv.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJudGphaW5xZHpndHRpa211eG12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzk3OTAsImV4cCI6MjA5NTgxNTc5MH0.7mJoDfKUdRuBDYOgQFujLEW8HQ9Gd5VQNiiAyWKpM54";
const SB_H = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};
const dbGet = k=>fetch(`${SB_URL}/rest/v1/store?select=value&key=eq.${k}`,{headers:SB_H}).then(r=>r.json()).then(rows=>rows[0]?.value||null).catch(()=>null);
const dbSet = (k,v)=>fetch(`${SB_URL}/rest/v1/store`,{method:"POST",headers:{...SB_H,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({key:k,value:v})}).catch(()=>{});

// ── Constantes de negocio ─────────────────────────────────────
const PIN_CODE   = "2025";
const TEJAS_M2   = 42;       // tejas por m² — fijo
const M2_ROLLO   = 41.4;     // m² que cubre un rollo de malla

const DEF_CFG = {
  costoMaterial:    600,     // COP por teja
  costoTrabajador:  270,     // COP por teja
  costoArriendo:    70,      // COP por teja
  costoLuz:         133,     // COP por teja
  precioSoloTejaM2:    85000,  // precio al cliente — Solo Teja
  precioTodoCostoM2:  106623,  // precio al cliente — Todo Costo
  precioMallaRollo:   262700,  // precio rollo malla al cliente
  precioInstaladorM2:  15000,  // mano de obra instalación pagada al instalador (en Todo Costo)
  costoMallaRolloCompra:262700,// costo real de comprar un rollo de malla
  pctInversion:     15,      // % de utilidad neta → Fondo Crecimiento
  pctComisionJG:    10,      // % sobre pago JG → comisión Kaston
  pctComisionHerm:  10,      // % sobre pago Hermilson → comisión Kaston
};

// ── Utils ─────────────────────────────────────────────────────
const uid  = ()=>Math.random().toString(36).slice(2,9);
const fmt  = n=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n||0);
const hoy  = ()=>new Date().toLocaleDateString("es-CO");
const n    = v=>parseFloat(v)||0;

function useStore(key,def=[]){
  const [data,setData]=useState(()=>{try{const c=localStorage.getItem(key);if(c)return JSON.parse(c);}catch{}return def;});
  const [ready,setReady]=useState(false);
  useEffect(()=>{(async()=>{try{const v=await dbGet(key);if(v){const p=JSON.parse(v);setData(p);localStorage.setItem(key,v);}}catch{}setReady(true);})();},[key]);
  const save=next=>{const d=typeof next==="function"?next(data):next;setData(d);const j=JSON.stringify(d);try{localStorage.setItem(key,j);}catch{}dbSet(key,j);};
  return [data,save,ready];
}

// ── Lógica financiera ─────────────────────────────────────────
// Rutas: A=Reemplazo cubierta, B=Solo suministro estructura, C=Adecuación desde cero
const RUTAS={
  A:{label:"Ruta A",desc:"Reemplazo de cubierta",sub:"Barro / Fibrocemento → KASTON",color:"bg-blue-700"},
  B:{label:"Ruta B",desc:"Solo suministro estructura",sub:"Base ya construida, sin contratistas externos",color:"bg-orange-600"},
  C:{label:"Ruta C",desc:"Adecuación estructural completa",sub:"Desde cero (ej: zinc). Activa JG + Hermilson",color:"bg-purple-600"},
};
const getRuta=o=>o.ruta||"A";

// Determina si se muestran tarjetas de contratistas
function mostrarContratistas(o){
  const r=getRuta(o);
  if(r==="C") return true;
  if(r==="A"&&o.requiereEstructural) return true;
  return false; // Ruta B nunca; Ruta A sin switch = nunca
}

// Tipo de contrato compatible con versiones anteriores
function getTipo(o){
  if(o.tipoContrato==="Todo Costo")           return "Todo Costo";
  if(o.tipoContrato==="Únicamente La Teja")   return "Únicamente La Teja";
  if(o.tipoContrato==="Solo Teja")            return "Únicamente La Teja"; // compat v1
  if(o.precio==="Todo costo")                 return "Todo Costo";
  return "Únicamente La Teja";
}

function getPrecioM2(o,cfg){
  return getTipo(o)==="Todo Costo"?(cfg.precioTodoCostoM2||106623):(cfg.precioSoloTejaM2||85000);
}

// Dispersión proporcional de un pago
function calcDisp(monto,m2,o,cfg){
  const total=(n(m2)*getPrecioM2(o,cfg));
  if(!total||!n(monto)) return null;
  const ratio=n(monto)/total;
  const tejas=ratio*n(m2)*TEJAS_M2;
  const matPrima        =tejas*(cfg.costoMaterial   ||600);
  const nomina          =tejas*(cfg.costoTrabajador  ||270);
  const costosFijos     =tejas*((cfg.costoArriendo||70)+(cfg.costoLuz||133));
  const esTodoCosto     =getTipo(o)==="Todo Costo";
  const pagoInstalador  =esTodoCosto?ratio*n(m2)*(cfg.precioInstaladorM2||15000):0;
  const costoMallaElectro=esTodoCosto?ratio*Math.ceil(n(m2)/M2_ROLLO)*(cfg.costoMallaRolloCompra||262700):0;
  const totalCostos     =matPrima+nomina+costosFijos+pagoInstalador+costoMallaElectro;
  const utilNeta        =n(monto)-totalCostos;
  const inversion       =Math.max(0,utilNeta)*(cfg.pctInversion||0)/100;
  return {tejas,matPrima,nomina,costosFijos,pagoInstalador,costoMallaElectro,totalCostos,utilNeta,inversion,utilLibre:utilNeta-inversion};
}

// Calcular rollos de malla necesarios
function calcRollos(m2,cfg){
  const r=Math.ceil(n(m2)/M2_ROLLO);
  return {rollos:r,total:r*(cfg.precioMallaRollo||262700)};
}

// Calcular estado de bolsas desde caja
function calcBolsas(caja,cfg){
  const pctInv=cfg?(cfg.pctInversion||0):null;
  const b={matPrima:0,nomina:0,costosFijos:0,inversion:0,disponible:0,pagoInstalador:0,costoMallaElectro:0};
  for(const e of caja){
    const m=n(e.monto);
    if(e.tipo==="matPrima")        b.matPrima        +=m;
    if(e.tipo==="nomina")          b.nomina           +=m;
    if(e.tipo==="costosFijos")     b.costosFijos      +=m;
    if(e.tipo==="inversion")       {if(pctInv===0)b.disponible+=m;else b.inversion+=m;}
    if(e.tipo==="utilLibre")       b.disponible       +=m;
    if(e.tipo==="mallas")          b.disponible       +=m;
    if(e.tipo==="pagoInstalador")  b.pagoInstalador   +=m;
    if(e.tipo==="costoMallaElectro")b.costoMallaElectro+=m;
    if(e.tipo==="gastoManual"){
      if(e.deBolsa==="nomina")           b.nomina           -=m;
      if(e.deBolsa==="matPrima")         b.matPrima         -=m;
      if(e.deBolsa==="costosFijos")      b.costosFijos      -=m;
      if(e.deBolsa==="inversion")        b.inversion        -=m;
      if(e.deBolsa==="disponible")       b.disponible       -=m;
      if(e.deBolsa==="pagoInstalador")   b.pagoInstalador   -=m;
      if(e.deBolsa==="costoMallaElectro")b.costoMallaElectro-=m;
    }
  }
  return b;
}

const ic  ="input-field w-full rounded-2xl px-4 py-3 text-white text-sm";
