// ── ProyectoDetalle ──────────────────────────────────────────
function ProyectoDetalle({obraId,obras,saveObras,config,caja,saveCaja,onBack}){
  const o=obras.find(x=>x.id===obraId);
  if(!o){onBack();return null;}
  const upd=patch=>saveObras(obras.map(x=>x.id===o.id?{...x,...patch}:x));
  const cfg={...DEF_CFG,...config};

  // Datos base
  const m2=n(o.m2);
  const tipo=getTipo(o);
  const precioM2=getPrecioM2(o,cfg);
  const ventaTejas=m2*precioM2;
  const tejasTotales=m2*TEJAS_M2;

  // Pagos Kaston
  const pagosKaston=o.pagosKaston||[];
  const totalCobrado=pagosKaston.reduce((s,p)=>s+n(p.monto),0);
  const pendiente=Math.max(0,ventaTejas-totalCobrado);

  // Mallas
  const {rollos,total:totalMallas}=calcRollos(m2,cfg);
  const listaCompras=o.listaCompras||[];

  // Favores
  const fondoFavores=n(o.fondoFavores);
  const listaFavores=o.listaFavores||[];
  const gastadoFavores=listaFavores.reduce((s,i)=>s+(i.precioUnit!==undefined?n(i.cantidad)*n(i.precioUnit):n(i.monto)||0),0);

  // Contratistas — % exclusivamente desde Ajustes globales
  const pagoJG  =n(o.pagoJG);
  const pagoHerm=n(o.pagoHerm);
  const pctJG   =cfg.pctComisionJG  ||0;
  const pctHerm =cfg.pctComisionHerm||0;
  const comJG   =pagoJG  *pctJG  /100;
  const comHerm =pagoHerm*pctHerm/100;

  // Local state
  const [pagoSh,setPagoSh]=useState(false);
  const [montoPago,setMontoPago]=useState("");
  const [nuevoFavor,setNuevoFavor]=useState({concepto:"",cantidad:"",precioUnit:""});
  const div=calcDisp(n(montoPago),m2,o,cfg);

  const registrarPago=()=>{
    const m=n(montoPago);
    if(!m||!div) return;
    const pid=uid(); // pagoId compartido por todo el lote
    upd({pagosKaston:[...pagosKaston,{id:pid,pagoId:pid,monto:m,fecha:hoy(),desglose:div}]});
    saveCaja(prev=>[...prev,
      {id:uid(),pagoId:pid,tipo:"matPrima",    monto:div.matPrima,    concepto:`Mat.Prima — ${o.nombre}`,    fecha:hoy(),obraId:o.id},
      {id:uid(),pagoId:pid,tipo:"nomina",      monto:div.nomina,      concepto:`Nómina — ${o.nombre}`,       fecha:hoy(),obraId:o.id},
      {id:uid(),pagoId:pid,tipo:"costosFijos", monto:div.costosFijos, concepto:`Costos Fijos — ${o.nombre}`, fecha:hoy(),obraId:o.id},
      ...(div.pagoInstalador>0?[{id:uid(),pagoId:pid,tipo:"pagoInstalador",monto:div.pagoInstalador,concepto:`Pago Instalador — ${o.nombre}`,fecha:hoy(),obraId:o.id}]:[]),
      ...(div.costoMallaElectro>0?[{id:uid(),pagoId:pid,tipo:"costoMallaElectro",monto:div.costoMallaElectro,concepto:`Costo Malla Electrosoldada — ${o.nombre}`,fecha:hoy(),obraId:o.id}]:[]),
      ...(div.inversion>0?[{id:uid(),pagoId:pid,tipo:"inversion",monto:div.inversion,concepto:`Fondo Crec. — ${o.nombre}`,fecha:hoy(),obraId:o.id}]:[]),
      {id:uid(),pagoId:pid,tipo:"utilLibre",   monto:div.utilLibre,   concepto:`Utilidad — ${o.nombre}`,    fecha:hoy(),obraId:o.id},
    ]);
    setMontoPago(""); setPagoSh(false);
  };

  const registrarMallas=()=>{
    if(o.mallasRegistradas) return;
    upd({mallasRegistradas:true});
    saveCaja(prev=>[...prev,{id:uid(),tipo:"mallas",monto:totalMallas,concepto:`Mallas — ${o.nombre}`,fecha:hoy(),obraId:o.id}]);
  };

  const toggleMallasSwitch=()=>{
    const next=!o.suministrarMallas;
    const lista=next&&rollos>0?[{id:uid(),concepto:`Comprar ${rollos} rollo${rollos>1?"s":""} Malla Electrosoldada 4mm`,monto:0,comprado:false}]:[];
    upd({suministrarMallas:next,listaCompras:lista,mallasRegistradas:false});
  };

  const toggleCompra=id=>upd({listaCompras:listaCompras.map(i=>i.id===id?{...i,comprado:!i.comprado}:i)});

  const itemTotal=item=>item.precioUnit!==undefined?n(item.cantidad)*n(item.precioUnit):n(item.monto)||0;
  const addFavor=()=>{
    const c=nuevoFavor.concepto.trim();
    if(!c) return;
    upd({listaFavores:[...listaFavores,{id:uid(),concepto:c,cantidad:n(nuevoFavor.cantidad)||1,precioUnit:n(nuevoFavor.precioUnit),comprado:false}]});
    setNuevoFavor({concepto:"",cantidad:"",precioUnit:""});
  };
  const toggleFavor=id=>upd({listaFavores:listaFavores.map(i=>i.id===id?{...i,comprado:!i.comprado}:i)});
  const delFavor  =id=>upd({listaFavores:listaFavores.filter(i=>i.id!==id)});

  return(
    <div className="p-4 fade-in" style={{paddingBottom:"calc(env(safe-area-inset-bottom)+96px)"}}>
      <Volver titulo={o.nombre} sub={o.cliente?"Cliente: "+o.cliente:o.direccion||""} onBack={onBack}/>

      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <Badge s={o.estado||"Por iniciar"}/>
        {(()=>{const r=RUTAS[getRuta(o)];return r&&<span className={`text-xs px-2 py-0.5 rounded-full text-white font-semibold ${r.color}`}>{r.label}</span>;})()}
        <span className="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded-full">{tipo}</span>
      </div>

      {/* ── Editor de m² inline ───────────────────── */}
      <div className="card rounded-2xl p-4 mb-4">
        <div className="flex items-center gap-3">
          <div className="flex-1">
            <label className="block text-xs text-gray-400 mb-1">Metros cuadrados (m²) de la obra</label>
            <input className={ic} type="number" placeholder="0"
              value={o.m2||""} onChange={e=>upd({m2:e.target.value})}/>
          </div>
          {m2>0&&(
            <div className="text-right flex-shrink-0">
              <p className="text-[9px] text-gray-500 uppercase">Tejas</p>
              <p className="text-sm font-bold text-white">{tejasTotales.toLocaleString()}</p>
            </div>
          )}
        </div>
        {m2>0&&tipo==="Todo Costo"&&(()=>{
          const instTotal = m2*(cfg.precioInstaladorM2||15000);
          const mallaCosto= Math.ceil(m2/M2_ROLLO)*(cfg.costoMallaRolloCompra||262700);
          const margen    = ventaTejas - m2*(cfg.precioSoloTejaM2||85000) - instTotal - mallaCosto;
          return(
            <div className="mt-3 border-t border-white/5 pt-3">
              <p className="text-[10px] text-gray-500 uppercase tracking-wider mb-2">Desglose Todo Costo — {fmt(ventaTejas)} total</p>
              <div className="space-y-1.5">
                {[
                  {l:"Teja KASTON (ingresa a caja)",      v:m2*(cfg.precioSoloTejaM2||85000), c:"text-green-400",  sub:`${m2} m² × ${fmt(cfg.precioSoloTejaM2||85000)}`},
                  {l:"Mano de obra instalación (instalador)",v:instTotal,                       c:"text-orange-400", sub:`${m2} m² × ${fmt(cfg.precioInstaladorM2||15000)}`},
                  {l:`Malla electrosoldada (${Math.ceil(m2/M2_ROLLO)} rollo${Math.ceil(m2/M2_ROLLO)!==1?"s":""})`,v:mallaCosto,c:"text-yellow-400",sub:`${Math.ceil(m2/M2_ROLLO)} × ${fmt(cfg.costoMallaRolloCompra||262700)}/rollo`},
                ].map(({l,v,c,sub})=>(
                  <div key={l} className="flex justify-between items-start">
                    <div><p className="text-xs text-gray-300">{l}</p><p className="text-[10px] text-gray-600">{sub}</p></div>
                    <span className={`text-xs font-bold flex-shrink-0 ml-2 ${c}`}>{fmt(v)}</span>
                  </div>
                ))}
                <div className="flex justify-between pt-1.5 border-t border-white/5">
                  <span className="text-xs text-gray-500">Margen restante Kaston</span>
                  <span className={`text-xs font-bold ${margen>=0?"text-white":"text-red-400"}`}>{fmt(margen)}</span>
                </div>
              </div>
            </div>
          );
        })()}
      </div>

      {/* ══ A — SECCIÓN KASTON ═══════════════════════ */}
      <p className="section-label mb-2">A — Sección Kaston</p>

      {/* Venta de Tejas */}
      <div className="card rounded-2xl p-4 mb-3">
        <div className="flex justify-between items-start mb-3">
          <div>
            <p className="text-xs text-gray-500 mb-0.5">Venta de Tejas</p>
            <p className="text-2xl font-black text-white">{m2>0?fmt(ventaTejas):"—"}</p>
            {m2>0&&<p className="text-xs text-gray-600">{m2} m² × {fmt(precioM2)}/m²</p>}
          </div>
          {ventaTejas>0&&(
            <div className="text-right">
              <p className="text-[9px] text-gray-500 uppercase">Cobrado</p>
              <p className={`text-sm font-bold ${totalCobrado>=ventaTejas?"text-green-400":"text-white"}`}>{fmt(totalCobrado)}</p>
              {pendiente>0&&<p className="text-xs text-orange-400 mt-0.5">Faltan {fmt(pendiente)}</p>}
            </div>
          )}
        </div>

        {/* Historial de pagos */}
        {pagosKaston.length>0&&(
          <div className="border-t border-white/5 pt-3 mb-3">
            {pagosKaston.map((p,i)=>(
              <div key={p.id} className={`py-2.5 ${i<pagosKaston.length-1?"border-b border-white/5":""}`}>
                <div className="flex justify-between text-sm mb-2">
                  <span className="text-gray-500 text-xs">{p.fecha}</span>
                  <span className="text-green-400 font-bold">{fmt(p.monto)}</span>
                </div>
                {p.desglose&&(
                  <div className="grid grid-cols-3 gap-1">
                    {[
                      {l:"Mat.Prima",  v:p.desglose.matPrima,   c:"text-yellow-400"},
                      {l:"Nómina",     v:p.desglose.nomina,     c:"text-orange-400"},
                      {l:"C.Fijos",   v:p.desglose.costosFijos, c:"text-red-400"},
                      ...(p.desglose.pagoInstalador>0?  [{l:"Instalador",v:p.desglose.pagoInstalador,  c:"text-orange-300"}]:[]),
                      ...(p.desglose.costoMallaElectro>0?[{l:"Malla",    v:p.desglose.costoMallaElectro,c:"text-yellow-300"}]:[]),
                      ...(p.desglose.inversion>0?        [{l:"Fondo Crec.",v:p.desglose.inversion,     c:"text-blue-400"}]:[]),
                    ].map(({l,v,c})=>(
                      <div key={l} className="bg-black/30 rounded-xl p-1.5 text-center">
                        <p className="text-[8px] text-gray-500">{l}</p>
                        <p className={`text-[10px] font-semibold ${c}`}>{fmt(v)}</p>
                      </div>
                    ))}
                  </div>
                )}
                {p.desglose&&p.desglose.utilLibre>0&&(
                  <p className="text-xs text-green-400 mt-1.5">Utilidad libre: {fmt(p.desglose.utilLibre)}</p>
                )}
              </div>
            ))}
          </div>
        )}

        {ventaTejas>0&&(
          <button onClick={()=>setPagoSh(true)}
            className="btn-primary w-full py-3 rounded-2xl font-bold text-sm text-white active:scale-95 transition-transform">
            + Registrar pago recibido
          </button>
        )}
        {!m2&&<p className="text-xs text-gray-600 text-center py-1">Define los m² en "Editar datos" para calcular la venta.</p>}
      </div>

      {/* Mallas — comportamiento según tipo de contrato */}
      {m2>0&&(
        <div className="card rounded-2xl p-4 mb-3">
          {tipo==="Todo Costo"?(
            /* ── Todo Costo: malla incluida, sin cobro extra ── */
            <>
              <div className="flex justify-between items-center mb-2">
                <p className="text-sm font-semibold">Malla Electrosoldada</p>
                <span className="text-[10px] px-2 py-0.5 rounded-full bg-green-900/20 border border-green-700/30 text-green-400 font-semibold">
                  Incluida en Todo Costo
                </span>
              </div>
              <p className="text-xs text-gray-500 mb-3">
                {rollos} rollo{rollos!==1?"s":""} para {m2} m² — absorbida en {fmt(precioM2)}/m², no se cobra extra al cliente.
              </p>
              {listaCompras.length===0&&rollos>0&&(
                <button onClick={()=>upd({listaCompras:[{id:uid(),concepto:`Comprar ${rollos} rollo${rollos!==1?"s":""} Malla Electrosoldada 4mm`,monto:0,comprado:false}]})}
                  className="w-full py-2 rounded-xl bg-gray-800 text-gray-300 text-xs font-semibold mb-2">
                  + Generar checklist de compra
                </button>
              )}
              {listaCompras.map(item=>(
                <div key={item.id} className="flex items-center gap-2 py-2 border-b border-gray-800 last:border-0">
                  <button onClick={()=>toggleCompra(item.id)}
                    className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition ${item.comprado?"bg-green-600 border-green-600":"border-gray-500"}`}>
                    {item.comprado&&<span className="text-white text-xs">✓</span>}
                  </button>
                  <span className={`text-sm flex-1 ${item.comprado?"line-through text-gray-500":""}`}>{item.concepto}</span>
                </div>
              ))}
            </>
          ):(
            /* ── Únicamente La Teja: switch opcional + cobro al cliente ── */
            <>
              <Toggle on={o.suministrarMallas||false} onToggle={toggleMallasSwitch}
                label="Suministrar Materiales Base (Mallas)"
                sub={`${rollos} rollo${rollos!==1?"s":""} · cobrar ${fmt(totalMallas)} extra al cliente`}/>
              {o.suministrarMallas&&(
                <div className="mt-3 border-t border-white/5 pt-3">
                  <div className="rounded-xl p-3 mb-3 bg-orange-900/20 border border-orange-700/30">
                    <p className="text-xs text-orange-400 font-semibold mb-0.5">Cobrar al cliente por mallas</p>
                    <p className="text-xl font-black text-orange-300">{fmt(totalMallas)}</p>
                    <p className="text-xs text-gray-600">{rollos} rollo{rollos!==1?"s":""} × {fmt(cfg.precioMallaRollo)}/rollo</p>
                  </div>
                  {listaCompras.map(item=>(
                    <div key={item.id} className="flex items-center gap-2 py-2 border-b border-gray-800 last:border-0">
                      <button onClick={()=>toggleCompra(item.id)}
                        className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition ${item.comprado?"bg-green-600 border-green-600":"border-gray-500"}`}>
                        {item.comprado&&<span className="text-white text-xs">✓</span>}
                      </button>
                      <span className={`text-sm flex-1 ${item.comprado?"line-through text-gray-500":""}`}>{item.concepto}</span>
                    </div>
                  ))}
                  {!o.mallasRegistradas?(
                    <button onClick={registrarMallas}
                      className="mt-3 w-full py-2.5 rounded-xl bg-green-800 text-white text-xs font-bold active:scale-95 transition-transform">
                      ✓ Registrar cobro de mallas al cliente ({fmt(totalMallas)})
                    </button>
                  ):(
                    <p className="text-xs text-green-400 text-center mt-3 py-2">✓ Cobro de mallas registrado — {fmt(totalMallas)}</p>
                  )}
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ══ B — FAVORES ══════════════════════════════ */}
      <p className="section-label mb-2">B — Favores de Compra y Logística</p>

      <div className="card rounded-2xl p-4 mb-3">
        <Toggle on={o.favorActivo||false} onToggle={()=>upd({favorActivo:!o.favorActivo})}
          label="Favores de compra y logística"
          sub="Cuentas de paso — no suma a ingresos Kaston"/>
        {o.favorActivo&&(
          <div className="mt-3 border-t border-white/5 pt-3">
            <Inp label="Dinero recibido del cliente para favores (COP)" type="number"
              value={o.fondoFavores||""} onChange={e=>upd({fondoFavores:e.target.value})} placeholder="0"/>

            {/* Indicador de fondos disponibles */}
            {fondoFavores>0&&(
              <div className={`rounded-xl p-3 mb-3 ${fondoFavores-gastadoFavores>=0?"bg-blue-900/20 border border-blue-700/30":"bg-red-900/20 border border-red-700/40"}`}>
                <p className="text-xs text-gray-400 mb-0.5">Fondos de Terceros Disponibles</p>
                <p className={`text-xl font-black ${fondoFavores-gastadoFavores>=0?"text-blue-200":"text-red-400"}`}>
                  {fmt(fondoFavores-gastadoFavores)}
                </p>
                <p className="text-[10px] text-gray-600">Recibido: {fmt(fondoFavores)} · Total gastos: {fmt(gastadoFavores)}</p>
              </div>
            )}

            {/* Lista de ítems con cantidad × precio */}
            {listaFavores.length>0&&(
              <div className="mb-3">
                <div className="grid grid-cols-12 gap-1 px-1 mb-1">
                  <p className="col-span-5 text-[9px] text-gray-600 uppercase">Producto</p>
                  <p className="col-span-2 text-[9px] text-gray-600 uppercase text-center">Cant.</p>
                  <p className="col-span-3 text-[9px] text-gray-600 uppercase text-right">P.Unit</p>
                  <p className="col-span-2 text-[9px] text-gray-600 uppercase text-right">Total</p>
                </div>
                {listaFavores.map(item=>{
                  const tot=item.precioUnit!==undefined?n(item.cantidad)*n(item.precioUnit):n(item.monto)||0;
                  return(
                    <div key={item.id} className={`grid grid-cols-12 gap-1 items-center py-2 border-b border-gray-800 ${item.comprado?"opacity-50":""}`}>
                      <button onClick={()=>toggleFavor(item.id)}
                        className={`col-span-1 w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 transition ${item.comprado?"bg-green-600 border-green-600":"border-gray-500"}`}>
                        {item.comprado&&<span className="text-white text-[9px] font-bold">✓</span>}
                      </button>
                      <span className={`col-span-4 text-xs truncate ${item.comprado?"line-through text-gray-500":""}`}>{item.concepto}</span>
                      <span className="col-span-2 text-xs text-gray-400 text-center">{n(item.cantidad)||1}</span>
                      <span className="col-span-2 text-xs text-gray-400 text-right">{fmt(n(item.precioUnit)||n(item.monto)||0)}</span>
                      <span className={`col-span-2 text-xs font-semibold text-right ${item.comprado?"text-gray-600":"text-white"}`}>{fmt(tot)}</span>
                      <button onClick={()=>delFavor(item.id)} className="col-span-1 text-red-500 text-base leading-none text-right">×</button>
                    </div>
                  );
                })}
                <div className="flex justify-between text-xs pt-2 font-bold">
                  <span className="text-gray-400">Total gastos de logística</span>
                  <span className="text-orange-400">{fmt(gastadoFavores)}</span>
                </div>
              </div>
            )}

            {/* Formulario de nuevo ítem */}
            <p className="text-[10px] text-gray-500 uppercase tracking-wide mb-2">Agregar ítem</p>
            <input className={ic+" mb-2"} placeholder="Producto / Descripción"
              value={nuevoFavor.concepto} onChange={e=>setNuevoFavor({...nuevoFavor,concepto:e.target.value})}
              onKeyDown={e=>{if(e.key==="Enter")addFavor();}}/>
            <div className="flex gap-2 mb-1">
              <input className={ic+" flex-1"} type="number" placeholder="Cantidad" min="0"
                value={nuevoFavor.cantidad} onChange={e=>setNuevoFavor({...nuevoFavor,cantidad:e.target.value})}/>
              <input className={ic+" flex-1"} type="number" placeholder="Precio unitario $" min="0"
                value={nuevoFavor.precioUnit} onChange={e=>setNuevoFavor({...nuevoFavor,precioUnit:e.target.value})}/>
            </div>
            {(n(nuevoFavor.cantidad)>0&&n(nuevoFavor.precioUnit)>0)&&(
              <p className="text-xs text-orange-400 mb-2">Total: {fmt(n(nuevoFavor.cantidad)*n(nuevoFavor.precioUnit))}</p>
            )}
            <button onClick={addFavor} className="btn-primary w-full py-2.5 rounded-xl font-bold text-sm text-white">
              + Agregar ítem
            </button>
          </div>
        )}
      </div>

      {/* ══ C — CONTRATISTAS ══════════════════════════ */}
      <p className="section-label mb-2">C — Contratistas</p>

      {/* Ruta B: sin contratistas externos */}
      {getRuta(o)==="B"&&(
        <div className="card rounded-2xl p-4 mb-5 flex items-center gap-3">
          <span className="text-2xl">🏗️</span>
          <div>
            <p className="text-sm font-semibold text-gray-200">Sin contratistas externos</p>
            <p className="text-xs text-gray-500">Ruta B — La base ya está construida. KASTON instala directamente.</p>
          </div>
        </div>
      )}

      {/* Ruta A: switch de excepción estructural */}
      {getRuta(o)==="A"&&(
        <div className="card rounded-2xl p-4 mb-3">
          <Toggle on={o.requiereEstructural||false}
            onToggle={()=>upd({requiereEstructural:!o.requiereEstructural})}
            label="¿Requiere arreglos estructurales / quitar peso al techo?"
            sub="Activa las tarjetas de Juan Guillermo y Hermilson para esta obra"/>
          {!(o.requiereEstructural)&&(
            <p className="text-xs text-gray-600 mt-2">Sin arreglos estructurales — Ruta A estándar.</p>
          )}
        </div>
      )}

      {/* Tarjetas de contratistas (Ruta C siempre · Ruta A solo si switch activo) */}
      {mostrarContratistas(o)&&(
        <>
          {[
            {
              key:"jg", dot:"bg-blue-500", nombre:"Juan Guillermo", rol:"Cubierta de madera",
              campoPago:"pagoJG",
              campoAntPct:"pctAnticipoJG", campoAntPag:"pagoAnticipoJG", campoSalPag:"pagoSaldoJG",
              campoRecibida:"comJGRecibida", campoFecha:"comJGFecha",
              pago:pagoJG, pct:pctJG, com:comJG, recibida:o.comJGRecibida||false, fecha:o.comJGFecha||"",
              pctAnticipo: o.pctAnticipoJG!==undefined&&o.pctAnticipoJG!==""?n(o.pctAnticipoJG):50,
              pagoAnticipo: o.pagoAnticipoJG||false,
              pagoSaldo:    o.pagoSaldoJG   ||false,
            },
            {
              key:"herm", dot:"bg-purple-500", nombre:"Hermilson", rol:"Mampostería y obra civil",
              campoPago:"pagoHerm",
              campoAntPct:"pctAnticipoHerm", campoAntPag:"pagoAnticipoHerm", campoSalPag:"pagoSaldoHerm",
              campoRecibida:"comHermRecibida", campoFecha:"comHermFecha",
              pago:pagoHerm, pct:pctHerm, com:comHerm, recibida:o.comHermRecibida||false, fecha:o.comHermFecha||"",
              pctAnticipo: o.pctAnticipoHerm!==undefined&&o.pctAnticipoHerm!==""?n(o.pctAnticipoHerm):50,
              pagoAnticipo: o.pagoAnticipoHerm||false,
              pagoSaldo:    o.pagoSaldoHerm   ||false,
            },
          ].map(ct=>{
            const pctSaldo    = Math.max(0, 100 - ct.pctAnticipo);
            const valAnticipo = ct.pago * ct.pctAnticipo / 100;
            const valSaldo    = ct.pago * pctSaldo / 100;
            const estado      = ct.pagoSaldo && ct.pagoAnticipo
              ? {l:"Contrato Liquidado",               c:"text-green-400",  bg:"bg-green-900/20 border-green-700/30"}
              : ct.pagoAnticipo
              ? {l:"Anticipo Pagado — Obra en Curso",  c:"text-yellow-400", bg:"bg-yellow-900/20 border-yellow-700/30"}
              : {l:"Sin abonar",                       c:"text-gray-500",   bg:"bg-gray-800/50 border-gray-700/30"};

            return (
              <div key={ct.key} className="card rounded-2xl p-4 mb-3">

                {/* Encabezado + estado */}
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <div className={`w-2 h-2 rounded-full ${ct.dot} flex-shrink-0`}/>
                    <p className="font-bold text-sm">{ct.nombre}</p>
                    <span className="text-xs text-gray-500">— {ct.rol}</span>
                  </div>
                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${estado.bg} ${estado.c}`}>
                    {estado.l}
                  </span>
                </div>

                {/* Valor total del contrato */}
                <Inp label={`Valor total acordado cliente → ${ct.nombre} (COP)`} type="number"
                  value={o[ct.campoPago]||""} onChange={e=>upd({[ct.campoPago]:e.target.value})} placeholder="0"/>

                {ct.pago>0&&(
                  <>
                    {/* Comisión Kaston — solo desde Ajustes globales */}
                    <div className="flex items-center justify-between mb-4 p-2.5 bg-black/20 rounded-xl">
                      <div>
                        <p className="text-xs text-gray-400">Comisión Kaston (desde Ajustes)</p>
                        <p className="text-[10px] text-gray-600">{ct.pct}% del costo total · cambia en ⚙️</p>
                      </div>
                      <span className="text-orange-400 font-bold">{fmt(ct.com)}</span>
                    </div>

                    {/* ── Fases de pago ───────────────────────── */}
                    <p className="section-label mb-2">Fases de pago del cliente</p>

                    {/* Porcentajes */}
                    <div className="flex gap-2 mb-3">
                      <div className="flex-1 bg-black/20 rounded-xl p-3">
                        <p className="text-[9px] text-gray-500 uppercase mb-1.5">% Anticipo Inicial</p>
                        <div className="flex items-center gap-1">
                          <input type="number" min="0" max="100" step="0.1"
                            className="w-14 bg-gray-800 border border-gray-700 rounded-xl px-2 py-1.5 text-white text-sm text-center outline-none focus:ring-1 focus:ring-orange-500"
                            value={o[ct.campoAntPct]!==undefined&&o[ct.campoAntPct]!==""?o[ct.campoAntPct]:ct.pctAnticipo}
                            onChange={e=>upd({[ct.campoAntPct]:e.target.value})}/>
                          <span className="text-gray-400 text-xs">%</span>
                        </div>
                        <p className="text-xs font-bold text-white mt-1.5">{fmt(valAnticipo)}</p>
                      </div>
                      <div className="flex-1 bg-black/20 rounded-xl p-3">
                        <p className="text-[9px] text-gray-500 uppercase mb-1.5">% Saldo Final (auto)</p>
                        <div className="flex items-center gap-1">
                          <div className="w-14 bg-gray-900 border border-gray-700/50 rounded-xl px-2 py-1.5 text-gray-400 text-sm text-center">{pctSaldo}</div>
                          <span className="text-gray-500 text-xs">%</span>
                        </div>
                        <p className="text-xs font-bold text-white mt-1.5">{fmt(valSaldo)}</p>
                      </div>
                    </div>

                    {/* Checkboxes de fases */}
                    <div className="space-y-2 mb-4">
                      {[
                        {campo:ct.campoAntPag, marcado:ct.pagoAnticipo, label:`¿Cliente pagó Anticipo de Inicio?`, val:valAnticipo,
                         labelOk:"✓ Anticipo de Inicio pagado", colOk:"bg-yellow-900/25 border-yellow-700/40 text-yellow-300",
                         colNo:"bg-gray-900/50 border-gray-700/50 text-gray-400", chkOk:"bg-yellow-500 border-yellow-500"},
                        {campo:ct.campoSalPag, marcado:ct.pagoSaldo,    label:`¿Cliente pagó Saldo de Finalización?`, val:valSaldo,
                         labelOk:"✓ Saldo de Finalización pagado", colOk:"bg-green-900/25 border-green-700/40 text-green-300",
                         colNo:"bg-gray-900/50 border-gray-700/50 text-gray-400", chkOk:"bg-green-600 border-green-600"},
                      ].map(({campo,marcado,label,val,labelOk,colOk,colNo,chkOk})=>(
                        <button key={campo} onClick={()=>upd({[campo]:!marcado})}
                          className={`w-full flex items-center gap-3 py-2.5 px-3 rounded-xl border transition text-left ${marcado?colOk:colNo}`}>
                          <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition ${marcado?chkOk:"border-gray-500"}`}>
                            {marcado&&<span className="text-white text-xs font-bold">✓</span>}
                          </div>
                          <div className="flex-1 min-w-0">
                            <p className="text-xs font-semibold">{marcado?labelOk:label}</p>
                            <p className="text-[10px] opacity-70">{fmt(val)}</p>
                          </div>
                        </button>
                      ))}
                    </div>

                    {/* ── Comisión Kaston ──────────────────────── */}
                    <div className="border-t border-white/5 pt-3">
                      {!ct.recibida?(
                        <div className="rounded-xl p-3 bg-orange-900/30 border border-orange-700/50">
                          <p className="text-orange-300 text-xs font-bold mb-0.5">⚠ Comisión pendiente</p>
                          <p className="text-orange-200 text-xs mb-3">{ct.nombre} debe {fmt(ct.com)} a Kaston.</p>
                          <button onClick={()=>upd({[ct.campoRecibida]:true,[ct.campoFecha]:hoy()})}
                            className="w-full py-2.5 rounded-xl bg-orange-600 text-white text-xs font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
                            <div className="w-4 h-4 rounded border-2 border-white/50 flex-shrink-0"/>
                            ¿Comisión recibida por Kaston?
                          </button>
                        </div>
                      ):(
                        <div className="rounded-xl p-3 bg-green-900/30 border border-green-700/40 flex items-center justify-between">
                          <div>
                            <p className="text-green-400 text-xs font-bold">✓ Comisión recibida por Kaston</p>
                            <p className="text-green-300 text-xs">{fmt(ct.com)}{ct.fecha?" · "+ct.fecha:""}</p>
                          </div>
                          <button onClick={()=>upd({[ct.campoRecibida]:false,[ct.campoFecha]:""})}
                            className="text-xs text-gray-500 underline">Revertir</button>
                        </div>
                      )}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </>
      )}

      {/* ── Sheet: Divisor Automático ──────────────── */}
      <Sheet open={pagoSh} onClose={()=>{setPagoSh(false);setMontoPago("");}} title="Divisor Automático Kaston">
        <p className="text-xs text-gray-400 mb-4">
          Venta total: <strong className="text-white">{fmt(ventaTejas)}</strong> · {Math.round(tejasTotales).toLocaleString()} tejas
        </p>
        <Inp label="Monto recibido (COP)" type="number"
          value={montoPago} onChange={e=>setMontoPago(e.target.value)} placeholder="0"/>
        {div&&(
          <>
            <p className="text-xs text-gray-500 mb-3">{Math.round(div.tejas).toLocaleString()} tejas equivalentes</p>
            <div className="card rounded-2xl p-4 mb-4">
              <p className="text-xs text-gray-400 uppercase tracking-wider mb-3">Dispersión automática</p>
              <div className="flex justify-between text-sm py-2 border-b border-white/5 font-semibold">
                <span className="text-gray-200">Total recibido</span>
                <span className="text-white font-bold">{fmt(n(montoPago))}</span>
              </div>
              {[
                {l:"Bolsa Materia Prima",sub:`${Math.round(div.tejas).toLocaleString()} tejas × ${fmt(cfg.costoMaterial)}`,v:div.matPrima,c:"text-yellow-400"},
                {l:"Bolsa Nómina Trabajador",sub:`× ${fmt(cfg.costoTrabajador)}/teja`,v:div.nomina,c:"text-orange-400"},
                {l:"Bolsa Costos Fijos",sub:`× ${fmt((cfg.costoArriendo||70)+(cfg.costoLuz||133))}/teja (arr.+luz)`,v:div.costosFijos,c:"text-red-400"},
                ...(div.pagoInstalador>0?[{l:"Pago Instalador",sub:`${m2} m² × ${fmt(cfg.precioInstaladorM2||15000)}/m²`,v:div.pagoInstalador,c:"text-orange-300"}]:[]),
                ...(div.costoMallaElectro>0?[{l:"Costo Malla Electrosoldada",sub:`${Math.ceil(m2/M2_ROLLO)} rollos × ${fmt(cfg.costoMallaRolloCompra||262700)}/rollo`,v:div.costoMallaElectro,c:"text-yellow-300"}]:[]),
              ].map(({l,sub,v,c})=>(
                <div key={l} className="py-2 border-b border-white/5">
                  <div className="flex justify-between">
                    <span className="text-sm text-gray-400">— {l}</span>
                    <span className={`text-sm font-semibold ${c}`}>{fmt(v)}</span>
                  </div>
                  <p className="text-[10px] text-gray-600">{sub}</p>
                </div>
              ))}
              <div className="flex justify-between py-2.5 border-b border-white/5 font-bold">
                <span className="text-gray-200">= Utilidad Neta</span>
                <span className={div.utilNeta>=0?"text-green-400":"text-red-400"}>{fmt(div.utilNeta)}</span>
              </div>
              {cfg.pctInversion>0&&(
                <div className="py-2 border-b border-white/5">
                  <div className="flex justify-between">
                    <span className="text-sm text-gray-400">— Fondo de Crecimiento</span>
                    <span className="text-sm font-semibold text-blue-400">{fmt(div.inversion)}</span>
                  </div>
                  <p className="text-[10px] text-gray-600">{cfg.pctInversion}% de la utilidad neta — no se toca</p>
                </div>
              )}
              <div className="flex justify-between py-3 font-black text-base">
                <span className="text-white">= {cfg.pctInversion>0?"Utilidad Libre":"Balance Disponible"}</span>
                <span className={div.utilLibre>=0?"text-green-400":"text-red-400"}>{fmt(div.utilLibre)}</span>
              </div>
            </div>
          </>
        )}
        <PBtn onClick={registrarPago} disabled={!div}>Confirmar y dispersar</PBtn>
      </Sheet>
    </div>
  );
}

// ── ProyectosTab ─────────────────────────────────────────────
function ProyectosTab({obras,saveObras,clientes,config,caja,saveCaja}){
  const [vista,setVista]=useState("lista");
  const [obraId,setObraId]=useState(null);
  const [sh,setSh]=useState(false);
  const [pendingDel,setPendingDel]=useState(null); // id de obra en espera de confirmación
  const blank={nombre:"",cliente:"",direccion:"",m2:"",ruta:"A",tipoContrato:"Únicamente La Teja",estado:"Por iniciar",notas:""};
  const [f,setF]=useState(blank);
  const upd=k=>e=>setF({...f,[k]:e.target.value});
  const cfg={...DEF_CFG,...config};

  const openForm=o=>{
    setF(o?{id:o.id,nombre:o.nombre||"",cliente:o.cliente||"",direccion:o.direccion||"",
      m2:o.m2||"",ruta:getRuta(o),tipoContrato:getTipo(o),estado:o.estado||"Por iniciar",notas:o.notas||""}:blank);
    setSh(true);
  };

  const guardar=()=>{
    if(!f.nombre.trim()) return;
    if(f.id) saveObras(obras.map(o=>o.id===f.id?{...o,...f}:o));
    else saveObras([{...f,id:uid(),fecha:hoy(),
      requiereEstructural:false,
      suministrarMallas:false,listaCompras:[],mallasRegistradas:false,
      favorActivo:false,fondoFavores:"",listaFavores:[],
      pagoJG:"",pagoHerm:"",comJGRecibida:false,comHermRecibida:false,
      pagosKaston:[]},...obras]);
    setSh(false);
  };
  const del=()=>{saveObras(obras.filter(o=>o.id!==f.id));setSh(false);};

  if(vista==="detalle"&&obraId) return(
    <ProyectoDetalle obraId={obraId} obras={obras} saveObras={saveObras}
      config={config} caja={caja} saveCaja={saveCaja}
      onBack={()=>{setVista("lista");setObraId(null);}}/>
  );

  const resumen=o=>{
    const m2=n(o.m2);
    const venta=m2*getPrecioM2(o,cfg);
    const cobrado=(o.pagosKaston||[]).reduce((s,p)=>s+n(p.monto),0);
    // Solo muestra alerta de comisión si la ruta activa contratistas
    const tieneContr=mostrarContratistas(o);
    const comJGPend=tieneContr&&n(o.pagoJG)>0&&(cfg.pctComisionJG||0)>0&&!o.comJGRecibida;
    const comHPend =tieneContr&&n(o.pagoHerm)>0&&(cfg.pctComisionHerm||0)>0&&!o.comHermRecibida;
    return {venta,cobrado,pendiente:Math.max(0,venta-cobrado),comPend:comJGPend||comHPend};
  };

  const TrashIcon=()=>(
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
  );

  return(
    <div className="p-4">
      {/* Botón prominente de agregar */}
      <button onClick={()=>{setPendingDel(null);openForm();}}
        className="btn-primary w-full py-3.5 rounded-2xl font-bold text-sm text-white mb-4 flex items-center justify-center gap-2">
        <span className="text-lg font-black">+</span> Agregar Obra / Cliente
      </button>

      {obras.length===0&&<p className="text-gray-500 text-center mt-12 text-sm">Sin proyectos. Toca el botón para crear uno.</p>}
      {obras.map(o=>{
        const r=resumen(o);
        const confirmando=pendingDel===o.id;
        return(
          <div key={o.id} className="card rounded-2xl p-4 mb-3">
            {/* Fila superior: nombre + acciones */}
            <div className="flex items-start gap-2 mb-1">
              <div className="flex-1 min-w-0 cursor-pointer" onClick={()=>{setPendingDel(null);setObraId(o.id);setVista("detalle");}}>
                <div className="flex items-center gap-2 flex-wrap">
                  <p className="font-semibold">{o.nombre}</p>
                  {r.comPend&&<span className="w-2 h-2 rounded-full bg-orange-500 pulse flex-shrink-0"/>}
                  <Badge s={o.estado||"Por iniciar"}/>
                </div>
                {o.cliente&&<p className="text-sm text-gray-400">Cliente: {o.cliente}</p>}
              </div>
              {/* Papelera */}
              {!confirmando?(
                <button onClick={e=>{e.stopPropagation();setPendingDel(o.id);}}
                  className="flex-shrink-0 w-8 h-8 rounded-xl bg-gray-800 flex items-center justify-center text-gray-500 hover:text-red-400 transition-colors active:scale-90">
                  <TrashIcon/>
                </button>
              ):(
                <div className="flex-shrink-0 flex gap-1">
                  <button onClick={e=>{e.stopPropagation();saveObras(obras.filter(x=>x.id!==o.id));setPendingDel(null);}}
                    className="px-2 py-1 rounded-xl bg-red-700 text-white text-[10px] font-bold active:scale-90">
                    Eliminar
                  </button>
                  <button onClick={e=>{e.stopPropagation();setPendingDel(null);}}
                    className="px-2 py-1 rounded-xl bg-gray-700 text-gray-300 text-[10px] font-bold active:scale-90">
                    No
                  </button>
                </div>
              )}
            </div>

            {/* Métricas */}
            <div className="cursor-pointer" onClick={()=>{setPendingDel(null);setObraId(o.id);setVista("detalle");}}>
              {n(o.m2)>0&&(
                <div className="mt-2 flex gap-3 flex-wrap">
                  <div><p className="text-[9px] text-gray-500 uppercase">Venta</p><p className="text-xs font-semibold text-white">{fmt(r.venta)}</p></div>
                  <div><p className="text-[9px] text-gray-500 uppercase">Cobrado</p><p className={`text-xs font-semibold ${r.cobrado>=r.venta&&r.venta>0?"text-green-400":"text-white"}`}>{fmt(r.cobrado)}</p></div>
                  {r.pendiente>0&&<div><p className="text-[9px] text-gray-500 uppercase">Pendiente</p><p className="text-xs font-semibold text-orange-400">{fmt(r.pendiente)}</p></div>}
                </div>
              )}
              <div className="mt-2 flex gap-2 items-center flex-wrap">
                {(()=>{const rt=RUTAS[getRuta(o)];return rt&&<span className={`text-[10px] px-1.5 py-0.5 rounded-full text-white ${rt.color}`}>{rt.label}</span>;})()}
                <span className="text-[10px] text-gray-600">{getTipo(o)}</span>
                {n(o.m2)>0&&<span className="text-[10px] text-gray-600">· {o.m2} m²</span>}
                {r.comPend&&<span className="text-[10px] text-orange-400">⚠ Comisión pendiente</span>}
              </div>
            </div>
            <button onClick={e=>{e.stopPropagation();setPendingDel(null);openForm(o);}}
              className="mt-2 text-[10px] text-gray-600 underline">Editar datos</button>
          </div>
        );
      })}

      <Sheet open={sh} onClose={()=>setSh(false)} title={f.id?"Editar proyecto":"Nuevo proyecto"}>
        <Inp label="Nombre del proyecto *" value={f.nombre} onChange={upd("nombre")} placeholder="Ej: Cubierta Casa García"/>
        <div className="mb-3">
          <label className="block text-xs text-gray-400 mb-1">Cliente</label>
          <input list="lstC" className={ic} value={f.cliente} onChange={upd("cliente")} placeholder="Nombre del cliente"/>
          <datalist id="lstC">{clientes.map(c=><option key={c.id||c.nombre} value={c.nombre}/>)}</datalist>
        </div>
        <Inp label="Dirección" value={f.direccion} onChange={upd("direccion")} placeholder="Dirección de la obra"/>
        <Inp label="Metros cuadrados (m²)" type="number" value={f.m2} onChange={upd("m2")} placeholder="0"/>

        {/* Selector de Ruta */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2">Ruta del proyecto</label>
          <div className="flex flex-col gap-2">
            {Object.entries(RUTAS).map(([k,r])=>(
              <button key={k} onClick={()=>setF({...f,ruta:k})}
                className={`w-full py-3 px-4 rounded-xl text-left border-2 transition ${f.ruta===k?"border-orange-400 bg-orange-600/10":"border-gray-700 bg-gray-800/50"}`}>
                <div className="flex items-center gap-2 mb-0.5">
                  <span className={`text-xs px-1.5 py-0.5 rounded-full text-white font-bold ${r.color}`}>{r.label}</span>
                  <span className={`text-sm font-semibold ${f.ruta===k?"text-orange-300":"text-gray-300"}`}>{r.desc}</span>
                </div>
                <p className="text-xs text-gray-500">{r.sub}</p>
              </button>
            ))}
          </div>
        </div>

        {/* Tipo de contrato — siempre visible */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2">Tipo de contrato</label>
          <div className="flex gap-2">
            {[{v:"Únicamente La Teja",p:85000,s:"Solo material"},{v:"Todo Costo",p:106623,s:"Suministro + instalación"}].map(({v,p,s})=>(
              <button key={v} onClick={()=>setF({...f,tipoContrato:v})}
                className={`flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition ${f.tipoContrato===v?"border-orange-400 bg-orange-600/20 text-orange-300":"border-gray-700 bg-gray-800 text-gray-400"}`}>
                <p className="text-xs">{v}</p>
                <p className="text-[11px] font-normal opacity-75 mt-0.5">{fmt(p)}/m²</p>
                <p className="text-[9px] opacity-50 mt-0.5">{s}</p>
              </button>
            ))}
          </div>
        </div>

        <Sel label="Estado" opts={["Por iniciar","En curso","Terminada","Cotizado","Perdido"]} value={f.estado||"Por iniciar"} onChange={upd("estado")}/>
        <Txt label="Notas" value={f.notas||""} onChange={upd("notas")} placeholder="Detalles adicionales..."/>
        <PBtn onClick={guardar}>{f.id?"Guardar cambios":"Crear proyecto"}</PBtn>
        {f.id&&<PBtn danger onClick={del}>Eliminar proyecto</PBtn>}
      </Sheet>
    </div>
  );
}

// ── ComisionesTab ─────────────────────────────────────────────
function ComisionesTab({obras,saveObras,config}){
  const cfg={...DEF_CFG,...config};
  const items=[];
  obras.forEach(o=>{
    if(!mostrarContratistas(o)) return;
    // % siempre desde Ajustes globales
    const pJG  =cfg.pctComisionJG  ||0;
    const pHerm=cfg.pctComisionHerm||0;
    const jg   =n(o.pagoJG)  *pJG  /100;
    const herm =n(o.pagoHerm)*pHerm/100;
    if(jg>0)   items.push({key:o.id+"-jg",  obraId:o.id,obra:o.nombre,quien:"Juan Guillermo",
      pago:n(o.pagoJG),  pct:pJG,  monto:jg,
      recibida:o.comJGRecibida  ||false, fecha:o.comJGFecha  ||"",
      campo:"comJGRecibida",  campoFecha:"comJGFecha",
      clientePago:o.clientePagoJG  ||false});
    if(herm>0) items.push({key:o.id+"-herm",obraId:o.id,obra:o.nombre,quien:"Hermilson",
      pago:n(o.pagoHerm),pct:pHerm,monto:herm,
      recibida:o.comHermRecibida||false, fecha:o.comHermFecha||"",
      campo:"comHermRecibida",campoFecha:"comHermFecha",
      clientePago:o.clientePagoHerm||false});
  });
  const pend=items.filter(i=>!i.recibida);
  const hist=items.filter(i=>i.recibida);
  const total=pend.reduce((s,i)=>s+i.monto,0);

  const marcar  =item=>saveObras(obras.map(o=>o.id===item.obraId?{...o,[item.campo]:true,[item.campoFecha]:hoy()}:o));
  const revertir=item=>saveObras(obras.map(o=>o.id===item.obraId?{...o,[item.campo]:false,[item.campoFecha]:""}:o));

  const Fila=({item,cobrada=false})=>(
    <div className={`card rounded-2xl p-4 mb-3 ${cobrada?"opacity-60":""}`}>
      <div className="flex justify-between items-start mb-2">
        <div className="flex-1 min-w-0 pr-3">
          <p className="font-semibold text-sm">{item.obra}</p>
          <p className="text-xs text-gray-500">{item.quien} · {item.pct}% de {fmt(item.pago)}</p>
          {item.clientePago&&<p className="text-[10px] text-blue-400 mt-0.5">✓ Cliente ya le pagó al contratista</p>}
        </div>
        <span className={`text-xl font-black flex-shrink-0 ${cobrada?"text-gray-500":"text-orange-400"}`}>{fmt(item.monto)}</span>
      </div>
      {!cobrada?(
        <button onClick={()=>marcar(item)}
          className="w-full py-2.5 rounded-xl bg-orange-700 text-white text-xs font-bold active:scale-95 transition-transform flex items-center justify-center gap-2">
          <div className="w-4 h-4 rounded border-2 border-white/50 flex-shrink-0"/>
          ¿Comisión recibida por Kaston?
        </button>
      ):(
        <div className="flex items-center justify-between">
          <div>
            <p className="text-xs text-green-400 font-semibold">✓ Recibida por Kaston{item.fecha?" · "+item.fecha:""}</p>
          </div>
          <button onClick={()=>revertir(item)} className="text-xs text-gray-600 underline">Revertir</button>
        </div>
      )}
    </div>
  );

  return(
    <div className="p-4" style={{paddingBottom:"calc(env(safe-area-inset-bottom)+96px)"}}>
      {/* Total pendiente */}
      {total>0&&(
        <div className="card rounded-2xl p-5 mb-5 text-center" style={{borderColor:"rgba(234,88,12,0.4)"}}>
          <p className="text-xs text-gray-400 uppercase tracking-wider mb-2">Total Comisiones por Recibir</p>
          <p className="text-4xl font-black text-orange-400">{fmt(total)}</p>
          <p className="text-xs text-gray-500 mt-1">{pend.length} comisión{pend.length!==1?"es":""} pendiente{pend.length!==1?"s":""}</p>
        </div>
      )}
      {total===0&&hist.length===0&&(
        <div className="text-center mt-20">
          <p className="text-gray-500 text-sm">Sin comisiones registradas.</p>
          <p className="text-xs text-gray-600 mt-1">Entra a un proyecto y completa los valores acordados con los contratistas.</p>
        </div>
      )}
      {total===0&&hist.length>0&&(
        <div className="card rounded-2xl p-4 mb-5 text-center" style={{borderColor:"rgba(34,197,94,0.25)"}}>
          <p className="text-xs text-green-400 uppercase tracking-wider mb-1">Todo cobrado</p>
          <p className="text-2xl font-black text-green-300">{fmt(hist.reduce((s,i)=>s+i.monto,0))}</p>
        </div>
      )}

      {/* Pendientes */}
      {pend.length>0&&(
        <><p className="section-label mb-3">Por cobrar</p>{pend.map(i=><Fila key={i.key} item={i}/>)}</>
      )}

      {/* Historial cobradas */}
      {hist.length>0&&(
        <>
          <p className="section-label mb-3 mt-5">Historial de Comisiones Cobradas</p>
          {hist.map(i=><Fila key={i.key} item={i} cobrada/>)}
        </>
      )}
    </div>
  );
}

// ── CajaTab ───────────────────────────────────────────────────
function CajaTab({caja,saveCaja,deudas,saveDeudas,obras,saveObras,config}){
  const [sh,setSh]=useState(false);
  const [editSh,setEditSh]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [editForm,setEditForm]=useState({concepto:"",monto:""});
  const todayISO=new Date().toISOString().slice(0,10);
  const blank={concepto:"",monto:"",deBolsa:"nomina",quien:"",fecha:todayISO};
  const [f,setF]=useState(blank);
  const upd=k=>e=>setF({...f,[k]:e.target.value});
  const cfg={...DEF_CFG,...config};
  const b=calcBolsas(caja,cfg);
  const esPrestamo=f.deBolsa==="prestamo";

  const guardar=()=>{
    const m=n(f.monto);
    if(!f.concepto.trim()||!m) return;
    if(esPrestamo){
      if(!f.quien.trim()) return;
      saveCaja(prev=>[...prev,{id:uid(),concepto:f.concepto,monto:m,tipo:"gastoManual",deBolsa:"disponible",fecha:f.fecha,manual:true}]);
      saveDeudas(prev=>[...prev,{id:uid(),quien:f.quien.trim(),monto:m,concepto:f.concepto,fecha:f.fecha,recuperado:false,fechaRecuperado:""}]);
    } else {
      saveCaja(prev=>[...prev,{...f,id:uid(),monto:m,tipo:"gastoManual",manual:true}]);
    }
    setF(blank); setSh(false);
  };

  // ── Editar entrada ───────────────────────────────
  const abrirEdit=e=>{ setEditEntry(e); setEditForm({concepto:e.concepto||"",monto:String(e.monto||"")}); setEditSh(true); };

  const guardarEdit=()=>{
    if(!editEntry) return;
    const newMonto=n(editForm.monto);
    const newConcepto=editForm.concepto.trim();
    if(!newConcepto) return;

    const montoIgual=newMonto===n(editEntry.monto);

    if(editEntry.pagoId&&!montoIgual){
      // Re-dispersión completa del lote
      const obra=obras&&obras.find(o=>o.id===editEntry.obraId);
      if(obra){
        const nuevoDiv=calcDisp(newMonto,obra.m2,obra,cfg);
        if(nuevoDiv){
          const pid=editEntry.pagoId;
          const cajaSinLote=caja.filter(e=>e.pagoId!==pid);
          const nuevasEntradas=[
            {id:uid(),pagoId:pid,tipo:"matPrima",    monto:nuevoDiv.matPrima,    concepto:`Mat.Prima — ${obra.nombre}`,    fecha:editEntry.fecha,obraId:obra.id},
            {id:uid(),pagoId:pid,tipo:"nomina",      monto:nuevoDiv.nomina,      concepto:`Nómina — ${obra.nombre}`,       fecha:editEntry.fecha,obraId:obra.id},
            {id:uid(),pagoId:pid,tipo:"costosFijos", monto:nuevoDiv.costosFijos, concepto:`Costos Fijos — ${obra.nombre}`, fecha:editEntry.fecha,obraId:obra.id},
            ...(nuevoDiv.pagoInstalador>0?[{id:uid(),pagoId:pid,tipo:"pagoInstalador",monto:nuevoDiv.pagoInstalador,concepto:`Pago Instalador — ${obra.nombre}`,fecha:editEntry.fecha,obraId:obra.id}]:[]),
            ...(nuevoDiv.costoMallaElectro>0?[{id:uid(),pagoId:pid,tipo:"costoMallaElectro",monto:nuevoDiv.costoMallaElectro,concepto:`Costo Malla Electrosoldada — ${obra.nombre}`,fecha:editEntry.fecha,obraId:obra.id}]:[]),
            ...(nuevoDiv.inversion>0?[{id:uid(),pagoId:pid,tipo:"inversion",monto:nuevoDiv.inversion,concepto:`Fondo Crec. — ${obra.nombre}`,fecha:editEntry.fecha,obraId:obra.id}]:[]),
            {id:uid(),pagoId:pid,tipo:"utilLibre",   monto:nuevoDiv.utilLibre,   concepto:`Utilidad — ${obra.nombre}`,    fecha:editEntry.fecha,obraId:obra.id},
          ];
          saveCaja([...cajaSinLote,...nuevasEntradas]);
          // Actualizar pagosKaston en la obra
          if(saveObras) saveObras(obras.map(o=>o.id===obra.id?{...o,pagosKaston:(o.pagosKaston||[]).map(p=>(p.pagoId===pid||p.id===pid)?{...p,monto:newMonto,desglose:nuevoDiv}:p)}:o));
        }
      }
    } else {
      // Actualización directa de concepto y/o monto
      saveCaja(caja.map(e=>e.id===editEntry.id?{...e,concepto:newConcepto,...(newMonto?{monto:newMonto}:{})}:e));
    }
    setEditSh(false); setEditEntry(null);
  };

  // Deuda directa (ya está en la calle — NO resta Balance al crearla)
  const [deudaSh,setDeudaSh]=useState(false);
  const blankDeuda={quien:"",concepto:"",monto:"",tipoDeuda:"externa"};
  const [fd,setFd]=useState(blankDeuda);

  const agregarDeuda=()=>{
    if(!fd.quien.trim()||!n(fd.monto)) return;
    const m=n(fd.monto);
    saveDeudas(prev=>[...prev,{id:uid(),quien:fd.quien.trim(),concepto:fd.concepto.trim(),monto:m,fecha:hoy(),recuperado:false,fechaRecuperado:"",tipoDeuda:fd.tipoDeuda}]);
    if(fd.tipoDeuda==="prestamo"){
      // Sale de la cuenta hoy → resta del Balance Disponible
      saveCaja(prev=>[...prev,{id:uid(),tipo:"gastoManual",deBolsa:"disponible",monto:m,concepto:`Préstamo — ${fd.quien.trim()}`,fecha:hoy(),manual:true}]);
    }
    setFd(blankDeuda); setDeudaSh(false);
  };

  const recuperar=d=>{
    saveDeudas(deudas.map(x=>x.id===d.id?{...x,recuperado:true,fechaRecuperado:hoy()}:x));
    // Suma al Balance Disponible sin pasar por el divisor — liquidez directa
    saveCaja(prev=>[...prev,{id:uid(),tipo:"utilLibre",monto:n(d.monto),concepto:`Recuperado — ${d.quien}`,fecha:hoy()}]);
  };

  const del=id=>saveCaja(caja.filter(e=>e.id!==id));
  const recientes=[...caja].sort((a,bx)=>(bx.fecha||"").localeCompare(a.fecha||"")).slice(0,25);

  const tipoLabel={matPrima:"Mat. Prima",nomina:"Nómina",costosFijos:"C. Fijos",
    inversion:"Fondo Crec.",utilLibre:"Ingreso/Ret.",mallas:"Mallas",gastoManual:"Egreso",ingreso:"Ingreso",
    pagoInstalador:"P.Instalador",costoMallaElectro:"Malla Electro"};
  const tipoColor={matPrima:"text-yellow-400",nomina:"text-orange-400",costosFijos:"text-red-400",
    inversion:"text-blue-400",utilLibre:"text-green-400",mallas:"text-green-400",
    gastoManual:"text-red-400",ingreso:"text-green-300",
    pagoInstalador:"text-orange-300",costoMallaElectro:"text-yellow-300"};

  const pendientes=(deudas||[]).filter(d=>!d.recuperado);
  const recuperadas=(deudas||[]).filter(d=>d.recuperado);
  const totalDeuda=pendientes.reduce((s,d)=>s+n(d.monto),0);

  const BOLSAS_DETALLE=[
    {k:"matPrima",   l:"Bolsa Materia Prima",  sub:"Polímero",          c:"text-yellow-400",bg:"bg-yellow-900/20",bc:"border-yellow-700/30"},
    {k:"nomina",     l:"Bolsa Nómina",         sub:"Trabajador Itagüí", c:"text-orange-400",bg:"bg-orange-900/20",bc:"border-orange-700/30"},
    {k:"costosFijos",l:"Bolsa Costos Fijos",   sub:"Arriendo + Luz",    c:"text-red-400",   bg:"bg-red-900/20",   bc:"border-red-700/30"},
  ];

  return(
    <div className="p-4" style={{paddingBottom:"calc(env(safe-area-inset-bottom)+96px)"}}>

      {/* ═══ PLANTA ALTA — Tu dinero real ═══════════ */}
      {/* Balance disponible */}
      <div className="rounded-2xl p-5 mb-4 text-center"
        style={{background:"linear-gradient(135deg,#081a0e,#0d2e16)",border:"1px solid rgba(34,197,94,0.2)"}}>
        <p className="text-xs text-green-400 uppercase tracking-widest mb-1">Balance Disponible</p>
        <p className={`text-4xl font-black ${b.disponible>=0?"text-green-200":"text-red-400"}`}>{fmt(b.disponible)}</p>
        <p className="text-xs text-green-900 mt-1">Utilidad libre acumulada</p>
      </div>

      <p className="section-label mb-3">Bolsas Reservadas</p>
      <div className="grid grid-cols-3 gap-2 mb-3">
        {BOLSAS_DETALLE.map(({k,l,sub,c,bg,bc})=>(
          <div key={k} className={`rounded-2xl p-3 ${bg} border ${bc}`}>
            <p className="text-[9px] text-gray-400 uppercase leading-tight mb-0.5">{l}</p>
            <p className="text-[9px] text-gray-600 mb-1">{sub}</p>
            <p className={`text-sm font-black ${c}`}>{fmt(b[k])}</p>
          </div>
        ))}
      </div>

      {cfg.pctInversion>0&&(
        <div className="rounded-2xl p-4 mb-4"
          style={{background:"linear-gradient(135deg,#0a1930,#091228)",border:"1px solid rgba(59,130,246,0.25)"}}>
          <p className="text-[10px] text-blue-400 uppercase tracking-widest mb-0.5">Fondo de Crecimiento / Futura Maquinaria</p>
          <p className="text-3xl font-black text-blue-100">{fmt(b.inversion)}</p>
          <p className="text-xs text-blue-800 mt-1">Esta plata no se toca — se acumula con cada venta</p>
        </div>
      )}
      {(b.pagoInstalador>0||b.costoMallaElectro>0)&&(
        <div className="grid grid-cols-2 gap-2 mb-3">
          {b.pagoInstalador>0&&(
            <div className="rounded-2xl p-3 bg-orange-900/20 border border-orange-700/30">
              <p className="text-[9px] text-gray-400 uppercase leading-tight mb-0.5">Pago Instalador</p>
              <p className="text-[9px] text-gray-600 mb-1">Mano de obra</p>
              <p className="text-sm font-black text-orange-300">{fmt(b.pagoInstalador)}</p>
            </div>
          )}
          {b.costoMallaElectro>0&&(
            <div className="rounded-2xl p-3 bg-yellow-900/20 border border-yellow-700/30">
              <p className="text-[9px] text-gray-400 uppercase leading-tight mb-0.5">Costo Malla</p>
              <p className="text-[9px] text-gray-600 mb-1">Electrosoldada</p>
              <p className="text-sm font-black text-yellow-300">{fmt(b.costoMallaElectro)}</p>
            </div>
          )}
        </div>
      )}

      {/* Botón registrar egreso */}
      <div className="flex justify-between items-center mb-3">
        <div>
          <p className="section-label">Registrar egreso manual</p>
          <p className="text-[10px] text-gray-600 mt-0.5">Arriendo, luz, nómina, préstamo…</p>
        </div>
        <button onClick={()=>setSh(true)}
          className="btn-primary w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl text-white flex-shrink-0">+</button>
      </div>

      {/* Movimientos recientes */}
      {recientes.length>0&&(
        <div className="card rounded-2xl p-4 mb-5">
          <p className="text-xs text-gray-400 uppercase tracking-wider mb-3">Movimientos recientes</p>
          {recientes.map(e=>(
            <div key={e.id} className="flex items-center gap-2 py-2 border-b border-white/5 last:border-0">
              <div className="flex-1 min-w-0">
                <p className="text-sm text-gray-200 truncate">{e.concepto}</p>
                <p className="text-xs text-gray-600">{e.fecha} · <span className={tipoColor[e.tipo]||"text-gray-500"}>{tipoLabel[e.tipo]||e.tipo}</span></p>
              </div>
              <span className={`text-sm font-semibold flex-shrink-0 ${e.tipo==="gastoManual"?"text-red-400":tipoColor[e.tipo]||"text-gray-400"}`}>
                {e.tipo==="gastoManual"?"–":"+"}{ fmt(e.monto)}
              </span>
              {/* Lápiz: editar */}
              <button onClick={()=>abrirEdit(e)}
                className="flex-shrink-0 w-7 h-7 rounded-lg bg-gray-800 flex items-center justify-center text-gray-400 hover:text-orange-400 transition-colors active:scale-90 ml-1">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              {/* X: eliminar (solo entradas manuales) */}
              {e.manual&&<button onClick={()=>del(e.id)} className="text-red-600 text-xl flex-shrink-0 leading-none">×</button>}
            </div>
          ))}
        </div>
      )}
      {caja.length===0&&<p className="text-gray-600 text-sm text-center mt-8 mb-6">Sin movimientos. Los pagos aparecen aquí al registrarlos en cada proyecto.</p>}

      {/* ═══ PLANTA BAJA — Tu dinero en la calle ════ */}
      <div className="border-t border-white/5 pt-5 mb-3 flex justify-between items-center">
        <p className="section-label">📑 Deudas a Favor / Por Recuperar</p>
        <button onClick={()=>setDeudaSh(true)}
          className="btn-primary px-4 py-2 rounded-xl text-xs font-bold text-white flex items-center gap-1">
          <span className="text-base font-black leading-none">+</span> Agregar Deuda
        </button>
      </div>

      {pendientes.length===0&&recuperadas.length===0&&(
        <p className="text-gray-600 text-xs text-center mb-4">Sin deudas registradas. Toca "+ Agregar Deuda" para registrar plata que ya está en la calle.</p>
      )}

      {/* Total en la calle + lista */}
      {pendientes.length>0&&(
        <>
          {/* Tarjeta resumen */}
          <div className="flex gap-3 mb-3">
            <div className="flex-1 rounded-2xl p-4"
              style={{background:"linear-gradient(135deg,#1a0e00,#2d1800)",border:"1px solid rgba(251,146,60,0.3)"}}>
              <p className="text-[9px] text-orange-400 uppercase tracking-wider mb-0.5">Total en la calle</p>
              <p className="text-3xl font-black text-orange-200">{fmt(totalDeuda)}</p>
              <p className="text-xs text-orange-800 mt-0.5">{pendientes.length} deuda{pendientes.length!==1?"s":""} pendiente{pendientes.length!==1?"s":""}</p>
            </div>
          </div>
          {/* Filas */}
          {pendientes.map(d=>(
            <div key={d.id} className="card rounded-2xl p-4 mb-2 flex items-center gap-3">
              <div className="flex-1 min-w-0">
                <p className="font-bold text-sm">{d.quien}</p>
                <p className="text-xs text-gray-500">{d.fecha}{d.concepto?" · "+d.concepto:""}</p>
                <p className="text-orange-400 font-bold text-base mt-0.5">{fmt(d.monto)}</p>
              </div>
              <button onClick={()=>recuperar(d)}
                className="flex-shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl bg-green-900/30 border border-green-700/40 active:scale-95 transition-transform">
                <div className="w-6 h-6 rounded-full border-2 border-green-500 flex items-center justify-center">
                  <span className="text-green-400 text-xs font-black">✓</span>
                </div>
                <span className="text-[9px] text-green-400 font-semibold">Recuperado</span>
              </button>
              {/* Papelera: borra el registro sin tocar el Balance */}
              <button onClick={()=>saveDeudas(deudas.filter(x=>x.id!==d.id))}
                className="flex-shrink-0 w-8 h-8 rounded-xl bg-gray-800 flex items-center justify-center text-gray-500 hover:text-red-400 transition-colors active:scale-90">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>
          ))}
        </>
      )}

      {/* Historial de recuperadas */}
      {recuperadas.length>0&&(
        <>
          <p className="section-label mb-2 mt-4">Recuperadas</p>
          {recuperadas.map(d=>(
            <div key={d.id} className="card rounded-2xl p-3 mb-2 opacity-50 flex items-center justify-between">
              <div>
                <p className="text-sm font-semibold">{d.quien}</p>
                <p className="text-xs text-gray-500">Recuperado {d.fechaRecuperado}</p>
              </div>
              <span className="text-green-400 font-bold">{fmt(d.monto)}</span>
            </div>
          ))}
        </>
      )}

      {/* ── Sheet: Agregar Deuda ─────────────────── */}
      <Sheet open={deudaSh} onClose={()=>{setDeudaSh(false);setFd(blankDeuda);}} title="Agregar Deuda a Favor">
        {/* Selector de tipo */}
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2">Tipo de Deuda *</label>
          <div className="flex flex-col gap-2">
            {[
              {v:"prestamo", l:"Plata que presté (Sale de la cuenta hoy)",    sub:"Resta el Balance Disponible al guardar",      bg:"bg-red-900/20 border-red-700/40",    sel:"border-red-500 bg-red-900/30"},
              {v:"externa",  l:"Plata que me deben (Externa / Antigua)",       sub:"No altera el Balance — solo registra el cobro pendiente", bg:"bg-blue-900/20 border-blue-700/40", sel:"border-blue-500 bg-blue-900/30"},
            ].map(({v,l,sub,bg,sel})=>(
              <button key={v} onClick={()=>setFd({...fd,tipoDeuda:v})}
                className={`w-full text-left px-4 py-3 rounded-xl border-2 transition ${fd.tipoDeuda===v?sel:bg+" border-transparent"}`}>
                <p className={`text-sm font-semibold ${fd.tipoDeuda===v?"text-white":"text-gray-300"}`}>{l}</p>
                <p className="text-xs text-gray-500 mt-0.5">{sub}</p>
              </button>
            ))}
          </div>
        </div>
        {/* Nota dinámica */}
        <div className={`rounded-xl p-3 mb-4 ${fd.tipoDeuda==="prestamo"?"bg-red-900/20 border border-red-700/30":"bg-blue-900/20 border border-blue-700/30"}`}>
          <p className={`text-xs font-semibold mb-0.5 ${fd.tipoDeuda==="prestamo"?"text-red-300":"text-blue-300"}`}>
            {fd.tipoDeuda==="prestamo"?"⬇ Salida de dinero hoy":"💡 Plata que ya está en la calle"}
          </p>
          <p className="text-xs text-gray-400">
            {fd.tipoDeuda==="prestamo"
              ?"Al guardar se resta del Balance Disponible. Al recuperar, sumará de vuelta."
              :"Al guardar NO se toca el Balance. Al recuperar, SÍ sumará al Balance Disponible."}
          </p>
        </div>
        <div className="mb-3">
          <label className="block text-xs text-gray-400 mb-1">Nombre del Deudor *</label>
          <input className={ic} value={fd.quien} onChange={e=>setFd({...fd,quien:e.target.value})} placeholder="¿Quién te debe?"/>
        </div>
        <div className="mb-3">
          <label className="block text-xs text-gray-400 mb-1">Concepto</label>
          <input className={ic} value={fd.concepto} onChange={e=>setFd({...fd,concepto:e.target.value})} placeholder="Ej: Préstamo personal, adelanto materiales…"/>
        </div>
        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-1">Valor en pesos $ *</label>
          <input className={ic} type="number" value={fd.monto} onChange={e=>setFd({...fd,monto:e.target.value})} placeholder="0"/>
        </div>
        <PBtn onClick={agregarDeuda}>Agregar Deuda</PBtn>
      </Sheet>

      {/* ── Sheet: Editar entrada ────────────────── */}
      <Sheet open={editSh} onClose={()=>{setEditSh(false);setEditEntry(null);}} title="Editar movimiento">
        {editEntry&&(
          <>
            <p className="text-xs text-gray-500 mb-4">
              Tipo: <span className={tipoColor[editEntry.tipo]||"text-gray-400"}>{tipoLabel[editEntry.tipo]||editEntry.tipo}</span>
              {editEntry.pagoId&&<span className="text-blue-500 ml-2">· Pago con divisor — ajustar valor redistribuye las bolsas</span>}
            </p>
            <div className="mb-3">
              <label className="block text-xs text-gray-400 mb-1">Nombre / Descripción</label>
              <input className={ic} value={editForm.concepto}
                onChange={e=>setEditForm({...editForm,concepto:e.target.value})} placeholder="Descripción"/>
            </div>
            <div className="mb-4">
              <label className="block text-xs text-gray-400 mb-1">
                Valor en pesos ${editEntry.pagoId?" (ajusta el monto TOTAL del pago — redistribuye las bolsas)":""}
              </label>
              <input className={ic} type="number" value={editForm.monto}
                onChange={e=>setEditForm({...editForm,monto:e.target.value})} placeholder="0"/>
              {editEntry.pagoId&&n(editForm.monto)!==n(editEntry.monto)&&n(editForm.monto)>0&&(()=>{
                const obra=obras&&obras.find(o=>o.id===editEntry.obraId);
                const d=obra?calcDisp(n(editForm.monto),obra.m2,obra,cfg):null;
                if(!d) return null;
                return(
                  <div className="card rounded-xl p-3 mt-2">
                    <p className="text-[10px] text-gray-400 uppercase mb-2">Nueva dispersión</p>
                    {[
                      {l:"Mat. Prima",   v:d.matPrima,    c:"text-yellow-400"},
                      {l:"Nómina",       v:d.nomina,      c:"text-orange-400"},
                      {l:"Costos Fijos", v:d.costosFijos, c:"text-red-400"},
                      ...(d.pagoInstalador>0?[{l:"Instalador",v:d.pagoInstalador,c:"text-orange-300"}]:[]),
                      ...(d.costoMallaElectro>0?[{l:"Malla",v:d.costoMallaElectro,c:"text-yellow-300"}]:[]),
                      ...(d.inversion>0?[{l:"Fondo Crec.",v:d.inversion,c:"text-blue-400"}]:[]),
                      {l:"Utilidad",     v:d.utilLibre,   c:"text-green-400"},
                    ].map(({l,v,c})=>(
                      <div key={l} className="flex justify-between text-xs py-0.5">
                        <span className="text-gray-500">{l}</span>
                        <span className={`font-semibold ${c}`}>{fmt(v)}</span>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>
            <PBtn onClick={guardarEdit}>Guardar cambios</PBtn>
          </>
        )}
      </Sheet>

      {/* ── Sheet: Egreso Manual ──────────────────── */}
      <Sheet open={sh} onClose={()=>setSh(false)} title="Registrar Egreso Manual">
        <Inp label="Descripción del gasto *" value={f.concepto} onChange={upd("concepto")}
          placeholder="Ej: Arriendo enero, nómina Juan, SIM card…"/>
        <Inp label="Valor en pesos $ (COP)" type="number" value={f.monto} onChange={upd("monto")} placeholder="0"/>

        <div className="mb-4">
          <label className="block text-xs text-gray-400 mb-2">Origen del Gasto / Bolsa</label>
          <select className={ic+" mb-2"} value={f.deBolsa} onChange={e=>setF({...f,deBolsa:e.target.value,quien:""})}>
            <option value="matPrima">Bolsa Materia Prima — compras de polímero</option>
            <option value="nomina">Bolsa Nómina Trabajador — pago al operario de tejas</option>
            <option value="costosFijos">Bolsa Gastos Fijos / Operación — arriendo, luz, SIM card…</option>
            <option value="pagoInstalador">Bolsa Pago Instalador — mano de obra instalación</option>
            <option value="costoMallaElectro">Bolsa Costo Malla Electrosoldada — compra material</option>
            <option value="inversion">Contador Azul (Fondo de Crecimiento / Inversión)</option>
            <option value="disponible">Utilidad Libre / Balance General — gastos imprevistos</option>
            <option value="prestamo">Préstamo / Cuenta por Cobrar</option>
          </select>

          {/* Campo extra solo para préstamos */}
          {esPrestamo&&(
            <div className="rounded-xl p-3 bg-orange-900/20 border border-orange-700/30 mb-2">
              <p className="text-xs text-orange-300 font-semibold mb-2">Este dinero se descuenta del Balance pero queda registrado como deuda activa.</p>
              <Inp label="¿A quién se le prestó la plata? *" value={f.quien} onChange={upd("quien")} placeholder="Nombre de la persona"/>
            </div>
          )}

          {/* Saldo actual de la bolsa */}
          {(()=>{
            const saldos={
              matPrima:   {l:"Bolsa Materia Prima",  v:b.matPrima,    c:"text-yellow-400"},
              nomina:     {l:"Bolsa Nómina",          v:b.nomina,      c:"text-orange-400"},
              costosFijos:{l:"Bolsa Costos Fijos",    v:b.costosFijos, c:"text-red-400"},
              inversion:  {l:"Fondo de Crecimiento", v:b.inversion,   c:"text-blue-400"},
              disponible: {l:"Balance Disponible",    v:b.disponible,  c:"text-green-400"},
              prestamo:   {l:"Balance Disponible",    v:b.disponible,  c:"text-green-400"},
            };
            const s=saldos[f.deBolsa];
            if(!s) return null;
            return(
              <div className="flex justify-between items-center px-3 py-2 bg-black/20 rounded-xl">
                <span className="text-xs text-gray-500">Saldo actual — {s.l}</span>
                <span className={`text-sm font-bold ${s.c}`}>{fmt(s.v)}</span>
              </div>
            );
          })()}
        </div>

        <Inp label="Fecha" type="date" value={f.fecha} onChange={upd("fecha")}/>
        <PBtn onClick={guardar}>Guardar Gasto</PBtn>
      </Sheet>
    </div>
  );
}

// ── ConfigSheet ───────────────────────────────────────────────
function ConfigSheet({open,onClose,config,saveConfig,obras,clientes}){
  const cfg={...DEF_CFG,...config};
  const setCfg=(k,v)=>{const num=parseFloat(v);saveConfig({...cfg,[k]:isNaN(num)?0:num});};
  const costoTotal=(cfg.costoMaterial||0)+(cfg.costoTrabajador||0)+(cfg.costoArriendo||0)+(cfg.costoLuz||0);
  const margenSoloTeja=cfg.precioSoloTejaM2/TEJAS_M2-costoTotal;

  return(
    <Sheet open={open} onClose={onClose} title="Ajustes Kaston">
      {/* Costos por teja */}
      <p className="section-label mb-1">Costos base por teja</p>
      <p className="text-xs text-gray-500 mb-3">1 m² = {TEJAS_M2} tejas · Rendimiento fijo</p>
      <div className="card rounded-2xl p-4 mb-4">
        {[
          {k:"costoMaterial",   l:"Polímero — Materia Prima",         def:600},
          {k:"costoTrabajador", l:"Trabajador Saca-tejas (nómina)",   def:270},
          {k:"costoArriendo",   l:"Arriendo bodega (prorrateado)",    def:70},
          {k:"costoLuz",        l:"Luz bodega (prorrateada)",         def:133},
        ].map(({k,l,def})=>(
          <div key={k} className="flex items-center gap-3 mb-3">
            <div className="flex-1">
              <p className="text-sm text-gray-200">{l}</p>
              <p className="text-[10px] text-gray-600">Default: ${def.toLocaleString("es-CO")}/teja</p>

              <span className="text-gray-500 text-xs">$</span>

          {k:"precioInstaladorM2",    l:"Mano de obra instalador",  unit:"por m²",   def:15000},

            <div className="flex items-center gap-1">

          {k:"precioTodoCostoM2", l:"Todo Costo (por m²)",            def:106623},

              <p className="text-sm text-gray-200">{l}</p>
              <p className="text-[10px] text-gray-600">Default: ${def.toLocaleString("es-CO")}</p>

            <div className="flex items-center gap-1">
              <span className="text-gray-500 text-xs">$</span>
              <input type="number" min="0"
                className="w-24 bg-black/30 rounded-xl px-2 py-1.5 text-white text-sm text-right outline-none focus:ring-1 focus:ring-orange-500"

      {/* Costos internos Todo Costo */}
      <p className="section-label mb-2">Costos internos — Todo Costo</p>

          {k:"precioInstaladorM2",   l:"Mano de obra instalación (por m²)", def:15000,  sub:"Lo que le pagas al instalador"},
          {k:"costoMallaRolloCompra",l:"Costo de compra malla (por rollo)",  def:262700, sub:"Lo que te cuesta comprarlo"},
        ].map(({k,l,def,sub})=>(
          <div key={k} className="flex items-center gap-3 mb-3 last:mb-0">
            <div className="flex-1">
              <p className="text-sm text-gray-200">{l}</p>
              <p className="text-[10px] text-gray-600">{sub} · Default: ${def.toLocaleString("es-CO")}</p>
            </div>
            <div className="flex items-center gap-1">
              <span className="text-gray-500 text-xs">$</span>
              <input type="number" min="0"
                className="w-24 bg-black/30 rounded-xl px-2 py-1.5 text-white text-sm text-right outline-none focus:ring-1 focus:ring-orange-500"

        {/* Resumen Todo Costo */}
        {(()=>{

          const teja=cfg.precioSoloTejaM2||85000;
          const malla=(cfg.costoMallaRolloCompra||262700)/M2_ROLLO;
          const total=cfg.precioTodoCostoM2||106623;

          return(
            <div className="border-t border-white/5 pt-2 mt-2 space-y-1">
              <div className="flex justify-between text-xs"><span className="text-gray-500">Teja + Instalador + Malla/m²</span><span className="text-gray-400">{fmt(teja+inst+malla)}/m²</span></div>

              <div className="flex justify-between text-xs font-bold"><span className={margen>=0?"text-green-400":"text-red-400"}>Margen Kaston / m²</span><span className={margen>=0?"text-green-400":"text-red-400"}>{fmt(margen)}</span></div>
